<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AFIF/LOG">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./manifest.json">
<title>AFIF/LOG</title>
<style>
  :root{
    --bg:#0a0a0a; --card:#171717; --border:#262626; --border2:#333;
    --ink:#f5f5f5; --ink2:#a3a3a3; --ink3:#737373; --ink4:#525252;
    --lime:#a3e635; --lime-dim:rgba(163,230,53,.10); --lime-bd:rgba(163,230,53,.40);
    --sky:#38bdf8; --orange:#fb923c; --orange-dim:rgba(251,146,60,.10); --orange-bd:rgba(251,146,60,.40);
    --emerald:#34d399; --red:#f87171; --purple:#a78bfa; --purple-dim:rgba(167,139,250,.10); --purple-bd:rgba(167,139,250,.40);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);font-family:ui-sans-serif,system-ui,-apple-system,sans-serif}
  body{min-height:100vh;padding-bottom:calc(80px + env(safe-area-inset-bottom))}
  .mono{font-family:ui-monospace,"SF Mono",Menlo,monospace}
  .wrap{max-width:28rem;margin:0 auto;padding:0 20px;padding-top:calc(24px + env(safe-area-inset-top))}
  .head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:4px;min-height:40px}
  h1{font-size:1.5rem;font-weight:900;letter-spacing:-.03em}
  h1 span{color:var(--lime)}
  .date{font-size:.75rem;color:var(--ink3)}
  /* header nav (back/forward + title + action) */
  .head-nav{display:flex;align-items:center;gap:6px;flex:0 0 auto}
  .nav-btn{width:32px;height:32px;border-radius:50%;background:var(--card);border:1px solid var(--border);color:var(--ink2);display:flex;align-items:center;justify-content:center}
  .nav-btn:active{background:#1f1f1f}
  .nav-btn.disabled{opacity:.3;pointer-events:none}
  .head-title{flex:1;text-align:center;font-size:1.5rem;font-weight:900;letter-spacing:-.03em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .head-title.sub{font-size:1.05rem}
  .gear-btn{width:32px;height:32px;border-radius:50%;background:var(--card);border:1px solid var(--border);color:var(--ink2);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .gear-btn:active{background:#1f1f1f}
  .head .date,.head-right-sp{flex:0 0 auto;min-width:32px;text-align:right}
  /* profile hub */
  .prof-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .prof-card{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:16px 6px;border-radius:.75rem;background:var(--card);border:1px solid var(--border);color:var(--ink);font-size:.78rem;font-weight:700}
  .prof-card:active{background:#1f1f1f}
  .rec-row{display:flex;align-items:center;justify-content:space-between;width:100%;padding:12px 14px;border-radius:.75rem;background:var(--card);border:1px solid var(--border);margin-bottom:8px;color:var(--ink)}
  .rec-row:active{background:#1f1f1f}
  .rec-row>span:first-child{display:flex;flex-direction:column;align-items:flex-start;gap:2px}
  .rec-date{font-size:.68rem;color:var(--ink3)}
  .rec-meta{font-size:.72rem;color:var(--ink2)}
  .rule{height:1px;background:linear-gradient(to right,var(--lime-bd),transparent);margin-bottom:24px}
  .stack>*+*{margin-top:16px}
  .card{border-radius:1rem;background:var(--card);border:1px solid var(--border);padding:20px}
  .card-sm{border-radius:.75rem;background:var(--card);border:1px solid var(--border);padding:12px}
  .row{display:flex;align-items:center;justify-content:space-between}
  .label{font-weight:700;font-size:.8rem;text-transform:uppercase;letter-spacing:.04em}
  .ic{width:18px;height:18px;stroke-width:2}
  .flex{display:flex;align-items:center;gap:8px}
  .gap3{gap:12px}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  .btn{border-radius:.5rem;padding:8px;display:flex;align-items:center;justify-content:center;flex:1}
  .btn-dark{background:#262626} .btn-dark:active{background:#404040}
  .btn-sky{background:var(--sky)} .btn-sky:active{filter:brightness(.9)}
  /* water pips */
  .pips{display:flex;gap:6px;margin:12px 0}
  .pip{flex:1;height:36px;border-radius:6px;background:#262626;transition:background .15s}
  .pip.on{background:var(--sky)}
  /* toggle cards */
  .toggle{width:100%;border-radius:1rem;border:1px solid var(--border);background:var(--card);padding:16px;display:flex;align-items:center;justify-content:space-between}
  .toggle.on-lime{background:var(--lime-dim);border-color:var(--lime-bd)}
  .toggle.on-orange{background:var(--orange-dim);border-color:var(--orange-bd)}
  .check{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid var(--border2)}
  .check.on{background:var(--lime);color:var(--bg);border:none}
  .check.on-o{background:var(--orange);color:var(--bg);border:none}
  .note{font-size:.7rem;color:var(--ink4);line-height:1.5;padding-top:4px}
  .banner{font-size:.72rem;line-height:1.5;border-radius:.75rem;padding:10px 12px;border:1px solid var(--orange-bd);background:var(--orange-dim);color:#fdba74}
  /* lift */
  .seg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .seg button{padding:10px;border-radius:.75rem;font-weight:700;font-size:.85rem;background:var(--card);border:1px solid var(--border);color:var(--ink2)}
  .seg button.on{background:var(--lime);color:var(--bg);border-color:var(--lime)}
  .ex-name{font-size:.85rem;font-weight:600;color:#e5e5e5;margin-bottom:2px}
  .ex-cue{font-size:.66rem;color:var(--ink4);line-height:1.4;margin-bottom:8px}
  .inputs{display:flex;gap:8px}
  input,textarea,select{font-family:inherit;width:100%;background:var(--bg);border:1px solid var(--border);border-radius:.5rem;padding:8px 12px;font-size:.85rem;color:var(--ink);outline:none;appearance:none;-webkit-appearance:none}
  input:focus,textarea:focus,select:focus{border-color:var(--lime)}
  input::placeholder,textarea::placeholder{color:var(--ink4)}
  select option{background:var(--card)}
  .save{width:100%;padding:14px;border-radius:.75rem;background:var(--lime);color:var(--bg);font-weight:900;display:flex;align-items:center;justify-content:center;gap:8px}
  .save:active{filter:brightness(.92)}
  /* lift timers */
  .lift-top{display:flex;align-items:center;gap:8px}
  .wk-dur{display:flex;align-items:center;gap:6px;flex:0 0 auto;padding:8px 10px;border-radius:.6rem;background:var(--card);border:1px solid var(--border)}
  .wk-dur .mono{font-size:.85rem;font-weight:700;color:var(--ink)}
  .rest-bar{flex:1;display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:.6rem;background:var(--card);border:1px solid var(--border);min-height:38px}
  .rest-tag{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--ink4);flex:0 0 auto}
  .rest-preset{flex:1;padding:6px 0;border-radius:.5rem;background:var(--bg);border:1px solid var(--border);color:var(--ink2);font-size:.75rem;font-weight:700}
  .rest-preset:active{background:var(--lime);color:var(--bg)}
  .rest-ctl{flex:0 0 auto;width:26px;height:26px;border-radius:50%;background:var(--bg);border:1px solid var(--border);color:var(--ink2);font-size:.7rem;display:flex;align-items:center;justify-content:center}
  .rest-clock{flex:0 0 auto;font-size:.85rem;font-weight:700;color:var(--lime);min-width:42px;text-align:center}
  .rest-prog{flex:1;height:6px;border-radius:99px;background:var(--border2);overflow:hidden}
  .rest-prog>div{height:100%;background:var(--lime);transition:width .9s linear}
  /* weight */
  .big{font-size:2.5rem;font-weight:900;line-height:1}
  .big span{font-size:1.1rem;color:var(--ink3);font-weight:700}
  .sub{font-size:.72rem;color:var(--ink3);margin-top:4px}
  .bar{height:8px;border-radius:99px;background:#262626;margin-top:12px;overflow:hidden}
  .bar>div{height:100%;background:linear-gradient(to right,var(--lime),var(--emerald))}
  .logbtn{padding:0 20px;border-radius:.75rem;background:var(--lime);color:var(--bg);font-weight:700}
  svg.chart{display:block;width:100%;height:160px}
  /* history */
  .hist-empty{color:var(--ink4);font-size:.85rem;text-align:center;padding:40px 0}
  .hist-sess{font-weight:700;font-size:.85rem;color:var(--lime)}
  .hist-line{display:flex;justify-content:space-between;font-size:.72rem;color:var(--ink2)}
  .hist-line span:last-child{color:#d4d4d4}
  /* photos */
  .photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .photo{position:relative;border-radius:.75rem;overflow:hidden;border:1px solid var(--border);aspect-ratio:3/4;background:var(--card)}
  .photo img{width:100%;height:100%;object-fit:cover;display:block}
  .photo .pdate{position:absolute;left:6px;bottom:6px;font-size:.6rem;background:rgba(0,0,0,.7);padding:2px 6px;border-radius:4px}
  .photo .pdel{position:absolute;top:6px;right:6px;width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;color:var(--red)}
  .photo-add{border:1px dashed var(--border2);border-radius:.75rem;aspect-ratio:3/4;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--ink3);background:var(--card)}
  /* lightbox */
  .lb{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:50;display:flex;align-items:center;justify-content:center;padding:20px}
  .lb img{max-width:100%;max-height:90vh;border-radius:.5rem}
  /* settings */
  .set-btn{width:100%;padding:14px;border-radius:.75rem;border:1px solid var(--border);background:var(--card);font-weight:700;font-size:.85rem;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--ink)}
  .set-btn:active{background:#1f1f1f}
  /* routines editor */
  .rt-block{border:1px solid var(--border);border-radius:.6rem;padding:10px 12px;margin-bottom:10px}
  .rt-ex{display:flex;align-items:center;justify-content:space-between;font-size:.78rem;color:var(--ink2);padding:4px 0;border-top:1px solid var(--border)}
  .rt-mini{padding:3px 8px;border-radius:.4rem;background:var(--bg);border:1px solid var(--border);color:var(--ink2);font-size:.66rem;font-weight:700;text-transform:capitalize}
  .rt-mini:active{background:var(--lime);color:var(--bg)}
  .rt-add{margin-top:8px;padding:6px 0;width:100%;border-radius:.5rem;background:var(--bg);border:1px dashed var(--border2);color:var(--ink3);font-size:.72rem;font-weight:700}
  /* tabbar */
  .tabbar{position:fixed;bottom:0;left:0;right:0;background:rgba(23,23,23,.95);backdrop-filter:blur(8px);border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom)}
  .tabbar .inner{max-width:28rem;margin:0 auto;display:flex}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 0;color:var(--ink3)}
  .tab.on{color:var(--lime)}
  .tab span{font-size:10px;font-weight:600;letter-spacing:.03em;text-transform:uppercase}
  .tab svg{width:20px;height:20px;stroke-width:2.2}
  .hidden{display:none}
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--lime);color:var(--bg);font-weight:700;font-size:.8rem;padding:8px 16px;border-radius:99px;z-index:60;opacity:0;transition:opacity .2s}
  .toast.show{opacity:1}
  /* energy slider */
  .energy-track{position:relative;height:36px;display:flex;align-items:center;margin:10px 0 4px}
  .energy-track input[type=range]{width:100%;height:6px;border-radius:99px;background:var(--border2);outline:none;border:none;padding:0;cursor:pointer;accent-color:var(--purple)}
  .energy-dots{display:flex;justify-content:space-between;padding:0 2px;margin-bottom:2px}
  .energy-dots span{font-size:.65rem;color:var(--ink4);font-weight:600}
  .energy-dots span.active{color:var(--purple)}
  /* cardio detail */
  .cardio-detail{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:10px}
  .field-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--ink3);margin-bottom:4px;display:block}
  .intensity-row{display:flex;gap:6px}
  .intensity-btn{flex:1;padding:8px 4px;border-radius:.5rem;font-size:.75rem;font-weight:700;background:var(--bg);border:1px solid var(--border);color:var(--ink3);text-align:center}
  .intensity-btn.on-easy{background:rgba(52,211,153,.15);border-color:rgba(52,211,153,.5);color:var(--emerald)}
  .intensity-btn.on-moderate{background:rgba(251,146,60,.15);border-color:rgba(251,146,60,.5);color:var(--orange)}
  .intensity-btn.on-hard{background:rgba(248,113,113,.15);border-color:rgba(248,113,113,.5);color:var(--red)}
  /* notes */
  .notes-area{resize:none;height:60px;font-size:.82rem;line-height:1.5}
  /* per-set weight override */
  .ov-row{margin-top:6px;align-items:center}
  .ov-tag{flex:0 0 auto;width:54px;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:var(--ink4)}
  .ov-row input{padding:6px 8px;font-size:.78rem}
  .ov-toggle{background:none;border:none;color:var(--ink3);font-size:.66rem;font-weight:700;padding:2px 0}
  .ov-toggle:active{color:var(--lime)}
  /* RIR row */
  .rir-row{display:flex;align-items:center;gap:8px;margin-top:8px}
  .rir-tag{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:var(--ink4);flex:0 0 auto}
  .rir-sel{flex:0 0 auto;width:64px;padding:5px 8px;font-size:.78rem;text-align:center}
  .rir-row .ov-toggle{margin-left:auto}
  /* dashboard / charts */
  .dash-item{margin-bottom:14px}
  .dash-item:last-child{margin-bottom:0}
  .dash-h{font-size:.68rem;font-weight:700;color:var(--ink3);margin-bottom:4px}
  .dash-item svg.chart{height:140px}
  /* body comp form */
  .bc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .bc-grid input{margin-top:2px}
</style>
</head>
<body>
<div class="wrap">
  <div class="head" id="appHead"></div>
  <div class="rule"></div>
  <div id="view"></div>
</div>

<nav class="tabbar"><div class="inner" id="tabbar"></div></nav>
<div class="toast" id="toast"></div>

<script>
/* ---------- icons ---------- */
const I={
  droplet:'<path d="M12 2.7s6 5.5 6 10.3a6 6 0 1 1-12 0C6 8.2 12 2.7 12 2.7Z"/>',
  dumbbell:'<path d="m6.5 6.5 11 11"/><path d="m21 21-1-1"/><path d="m3 3 1 1"/><path d="m18 22 4-4"/><path d="m2 6 4-4"/><path d="m3 10 7-7"/><path d="m14 21 7-7"/>',
  trend:'<polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/>',
  check:'<polyline points="20 6 9 17 4 12"/>',
  plus:'<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
  minus:'<line x1="5" y1="12" x2="19" y2="12"/>',
  save:'<path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>',
  foot:'<path d="M4 16v-2.38C4 11.5 2.97 10.5 3 8c.03-2.72 1.49-6 4.5-6C9.37 2 10 3.8 10 5.5c0 3.11-2 5.66-2 8.68V16a2 2 0 1 1-4 0Z"/><path d="M20 20v-2.38c0-2.12 1.03-3.12 1-5.62-.03-2.72-1.49-6-4.5-6C14.63 6 14 7.8 14 9.5c0 3.11 2 5.66 2 8.68V20a2 2 0 1 0 4 0Z"/>',
  cam:'<path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/>',
  trash:'<polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>',
  image:'<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.5-3.5L7 21"/>',
  download:'<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>',
  upload:'<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>',
  zap:'<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>',
  pencil:'<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>',
  cal:'<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>',
  home:'<path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>',
  user:'<path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>',
  gear:'<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>',
  back:'<line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>',
  fwd:'<line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>'
};
const svg=(p,cls="ic")=>`<svg class="${cls}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;

/* ---------- config ---------- */
const SESSIONS={
  "Upper A":[["Chest press","Shoulder blades back, lower to mid-chest, no bounce."],["Lat pulldown","Pull to upper chest, lead with elbows, no swing."],["Seated row","Squeeze shoulder blades, control return."],["Shoulder press","Don't lock out hard, full range, ribs down."],["Bicep curl","Elbows pinned, no torso swing."],["Triceps pushdown","Elbows fixed at sides, full extension."]],
  "Lower A":[["Leg press","Feet shoulder width, knees track toes, no lockout."],["Romanian deadlift","Hinge at hips, flat back, feel hamstrings."],["Leg curl","Slow controlled, no hip lift."],["Leg extension","Pause at top, lower slow."],["Calf raise","Full stretch bottom, full squeeze top."],["Plank","Straight line, brace abs, breathe."]],
  "Upper B":[["Incline press","Targets upper chest, control descent."],["Assisted pull-up","Full hang, pull chest toward bar."],["Cable row","Drive elbow back, squeeze, no rotation."],["Lateral raise","Lead with elbows, slight bend, no shrug."],["Face pull","Pull to forehead, elbows high."],["Hammer curl","Controlled, no momentum."]],
  "Lower B":[["Goblet/Hack squat","Chest up, sit back, pain-free depth."],["Hip thrust","Squeeze glutes at top, chin tucked."],["Walking lunge","Knee over ankle, tall torso."],["Leg curl","Slow, no hip lift."],["Seated calf raise","Full range, pause top."],["Hanging knee raise","Curl pelvis up, don't swing."]]
};
/* default upper/lower classification for seeding routines */
const SESSION_TYPE={"Upper A":"upper","Lower A":"lower","Upper B":"upper","Lower B":"lower"};
/* user-editable routines live in localStorage (key "routines"), seeded from SESSIONS once.
   shape: { name: {type:"upper"|"lower", exercises:[[name,cue],...]} } */
function seedRoutines(){
  if(!LS.get("routines")){
    const seed={};
    Object.keys(SESSIONS).forEach(k=>seed[k]={type:SESSION_TYPE[k]||(/lower/i.test(k)?"lower":"upper"),exercises:SESSIONS[k]});
    LS.set("routines",seed);
  }
}
function routines(){return LS.get("routines",{});}
function routineNames(){return Object.keys(routines());}

const getDefaultDaily=()=>({

  energy:0,
  notes:"",

const saveDaily=(updates)=>{
  try{
    const key=`daily:${todayStr()}`;
    let current={};
    try{const e=LS.get(key);if(e)current=e;}catch(err){console.warn("Load failed:",err);}
    const merged={...current,...updates};
    LS.set(key,merged);
    return merged;
  }catch(err){console.error("Save failed:",err);return null;}
};

const loadDaily=()=>{
  try{
    const d=LS.get(`daily:${todayStr()}`);
    if(!d)return getDefaultDaily();
    // back-compat: old cardio was boolean
    if(typeof d.cardio==="boolean"){
      d.cardio={done:d.cardio,type:null,duration_min:null,intensity:"easy",run_ratio:null};
    }
    return {...getDefaultDaily(),...d};
  }catch(err){return getDefaultDaily();}
};

/* ---------- week helpers ---------- */
function weekBounds(){
  const today=new Date(todayStr());
  const dow=today.getDay();
  const diffToMon=dow===0?-6:1-dow;
  const mon=new Date(today);mon.setDate(today.getDate()+diffToMon);
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  const fmt=d=>d.toLocaleDateString("en-CA");
  return{weekStart:fmt(mon),weekEnd:fmt(sun)};
}
function weeklySessionCount(){
  const{weekStart,weekEnd}=weekBounds();
  return workouts().filter(w=>w.date>=weekStart&&w.date<=weekEnd).length;
}
function weeklyEnergyAvg(){
  const{weekStart,weekEnd}=weekBounds();
  const vals=[];
  const cur=new Date(weekStart);
  while(true){
    const ds=cur.toLocaleDateString("en-CA");
    if(ds>weekEnd)break;
    const d=LS.get(`daily:${ds}`);
    if(d&&d.energy>0)vals.push(d.energy);
    cur.setDate(cur.getDate()+1);
  }
  if(!vals.length)return null;
  return(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1);
}
function latestWeight(){const w=weights();return w.length?w[w.length-1].kg:null;}

/* ---------- one-shot schema migration ---------- */
function migrateWorkouts(){
  const all=workouts();let changed=false;
  const migrated=all.map(w=>({...w,entries:w.entries.map(e=>{
    // old "3x12" string format -> sets[]
    if(!e.sets&&e.reps){
      const m=e.reps.match(/(\d+)\s*[x×]\s*(\d+)/i);
      if(m){changed=true;const r=parseInt(m[2]);const wt=parseFloat(e.weight)||null;
        return{ex:e.ex,weight:wt,sets:[{weight:wt,reps:r},{weight:wt,reps:r},{weight:wt,reps:r}]};}
    }
    // backfill per-set weight from entry weight (idempotent)
    if(e.sets&&e.sets.some(s=>s&&s.weight===undefined)){
      changed=true;
      return{...e,sets:e.sets.map(s=>s?{...s,weight:s.weight===undefined?(e.weight??null):s.weight}:s)};
    }
    return e;
  })}));
  if(changed)LS.set("workouts",migrated);
}

/* ---------- timers (rest + workout duration) ---------- */
const fmtClock=s=>{const m=Math.floor(s/60),ss=s%60;return m+":"+String(ss).padStart(2,"0");};
function restDone(){
  if(navigator.vibrate)navigator.vibrate([200,100,200]);
  try{const A=window.AudioContext||window.webkitAudioContext;const a=new A();const o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);o.frequency.value=880;g.gain.value=.1;o.start();
    setTimeout(()=>{try{o.stop();a.close();}catch{}},260);}catch{}
}
function runRest(){
  if(restTimer)clearInterval(restTimer);
  restTimer=setInterval(()=>{
    restLeft--;
    if(restLeft<=0){clearInterval(restTimer);restTimer=null;restLeft=0;restTotal=0;restDone();}
    updateRestBar();
  },1000);
  updateRestBar();
}
window.restStart=sec=>{restTotal=sec;restLeft=sec;runRest();};
window.restToggle=()=>{if(restTimer){clearInterval(restTimer);restTimer=null;updateRestBar();}else if(restLeft>0)runRest();};
window.restReset=()=>{if(restTimer)clearInterval(restTimer);restTimer=null;restLeft=0;restTotal=0;updateRestBar();};
function restBarHTML(){
  if(restTimer||restLeft>0){
    const pct=restTotal?(restLeft/restTotal)*100:0;
    return `<button class="rest-ctl" onclick="restToggle()">${restTimer?'❚❚':'▶'}</button>
      <span class="rest-clock mono">${fmtClock(restLeft)}</span>
      <div class="rest-prog"><div style="width:${pct}%"></div></div>
      <button class="rest-ctl" onclick="restReset()">✕</button>`;
  }
  return `<span class="rest-tag">Rest</span>`+
    [60,90,120].map(s=>`<button class="rest-preset" onclick="restStart(${s})">${s}s</button>`).join("");
}
function updateRestBar(){const el=document.getElementById("restBar");if(el)el.innerHTML=restBarHTML();}
function updateDurLabel(){const el=document.getElementById("wkDur");if(el)el.textContent=workoutStart?fmtClock(Math.floor((Date.now()-workoutStart)/1000)):"0:00";}
function ensureDurTimer(){if(!durTimer)durTimer=setInterval(updateDurLabel,1000);}

function saveDraft(){LS.set("lift_draft",{sess,log,startedAt:workoutStart});}
window.pickSess=s=>{sess=s;saveDraft();renderLift();};
window.setLog=(ex,k,v)=>{if(!workoutStart){workoutStart=Date.now();updateDurLabel();}log[ex]={...(log[ex]||{}),[k]:v};saveDraft();};
window.toggleOverride=ex=>{log[ex]={...(log[ex]||{}),_ov:!(log[ex]&&log[ex]._ov)};saveDraft();renderLift();};
window.saveWorkout=()=>{
  const entries=routineExercises(sess).map(([ex])=>{
    const l=log[ex]||{};
    const w=l.weight?parseFloat(l.weight):null;
    const rir=(l.rir!=null&&l.rir!=='')?parseInt(l.rir):null;
    const sets=['s0','s1','s2'].map((k,i)=>{
      const reps=l[k]?parseInt(l[k]):null;
      const ov=l['w'+i]?parseFloat(l['w'+i]):null;
      return{weight:reps===null?null:(ov!==null?ov:w),reps,rir:reps===null?null:rir};
    });
    if(!w&&sets.every(s=>s.reps===null))return null;
    return{ex,weight:w,sets};
  }).filter(Boolean);
  if(!entries.length){toast("Nothing logged");return;}
  const durationMin=workoutStart?Math.max(1,Math.round((Date.now()-workoutStart)/60000)):null;
  const rec={date:todayStr(),session:sess,entries};
  if(durationMin!=null)rec.durationMin=durationMin;
  const prevPRs=exercisePRs();
  const next=[rec,...workouts()].slice(0,120);
  LS.set("workouts",next);
  const saved=entries;
  const prs=[];
  saved.forEach(e=>{
    let bw=0,be=0;(e.sets||[]).forEach(s=>{if(s&&s.reps&&s.weight){bw=Math.max(bw,s.weight);be=Math.max(be,est1RM(s.weight,s.reps));}});
    const prev=prevPRs[e.ex]||{weight:0,e1rm:0};
    if(bw>prev.weight||be>prev.e1rm)prs.push({ex:e.ex,weight:bw,e1rm:+be.toFixed(1),newWeight:bw>prev.weight});
  });
  LS.del("lift_draft");log={};workoutStart=null;restReset();renderLift();toast(prs.length?`🏆 ${prs.length} new PR${prs.length>1?'s':''}!`:"Saved "+sess);
  const toFailure=saved.some(e=>(e.sets||[]).some(s=>s&&s.rir===0));
  const targets=computeNextTargets(saved,sess);
  renderProgression(targets,sess,toFailure,prs);
};

/* ---------- progression ---------- */
function computeNextTargets(entries,sessionType){
  const isUpper=routineType(sessionType)!=="lower";
  const inc=isUpper?2.5:5;
  const noWeight=["Plank","Hanging knee raise"];
  return entries.filter(e=>e.weight&&!noWeight.includes(e.ex)).map(e=>{
    const reps=(e.sets||[]).map(s=>s.reps||0);
    const allHit12=reps.length===3&&reps.every(r=>r>=12);
    return{
      ex:e.ex,
      weight:e.weight,
      nextWeight:allHit12?+(e.weight+inc).toFixed(2):e.weight,
      targetReps:allHit12?[10,10,10]:[12,12,12],
      promoted:allHit12,
      repsHit:reps
    };
  });
}
function renderProgression(targets,sessionType,toFailure,prs){
  const el=document.getElementById('prog-card');
  prs=prs||[];
  if(!el||(!targets.length&&!toFailure&&!prs.length))return;
  const warn=toFailure?`<div class="banner" style="margin-bottom:10px">Logged RIR 0 — trained to failure. With anemia, leave 1-2 reps in reserve.</div>`:'';
  const prHTML=prs.length?`<div class="card" style="border-color:var(--lime-bd);background:var(--lime-dim);margin-bottom:10px">
    <div style="color:var(--lime);font-weight:700;font-size:.72rem;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px">🏆 New personal records</div>
    ${prs.map(p=>`<div class="hist-line" style="padding:3px 0"><span>${p.ex}</span><span class="mono" style="color:var(--lime)">${p.weight}kg · e1RM ${p.e1rm}</span></div>`).join('')}
  </div>`:'';
  if(!targets.length){el.innerHTML=warn+prHTML;return;}
  el.innerHTML=`${warn}${prHTML}<div class="card" style="border-color:var(--lime-bd);background:var(--lime-dim)">
    <div style="color:var(--lime);font-weight:700;font-size:.72rem;text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px">Next ${sessionType} targets</div>
    ${targets.map(t=>{
      const rStr=t.repsHit.length?t.repsHit.join(', '):'–';
      const aStr=t.targetReps.join(', ');
      return t.promoted
        ?`<div style="padding:6px 0;border-bottom:1px solid rgba(163,230,53,.15)">
            <div style="display:flex;justify-content:space-between;align-items:baseline">
              <span style="font-size:.82rem;font-weight:600;color:var(--ink)">${t.ex}</span>
              <span class="mono" style="font-size:.78rem;color:var(--lime);font-weight:700">${t.nextWeight}kg ↑</span>
            </div>
            <div style="font-size:.68rem;color:var(--ink3);margin-top:2px">Hit ${rStr} · aim <span class="mono">${aStr}</span> reps</div>
          </div>`
        :`<div style="padding:6px 0;border-bottom:1px solid var(--border)">
            <div style="display:flex;justify-content:space-between;align-items:baseline">
              <span style="font-size:.82rem;color:var(--ink2)">${t.ex}</span>
              <span class="mono" style="font-size:.78rem;color:var(--ink2)">${t.nextWeight}kg</span>
            </div>
            <div style="font-size:.68rem;color:var(--ink4);margin-top:2px">Got ${rStr} · aim <span class="mono">${aStr}</span> reps</div>
          </div>`;
    }).join('')}
  </div>`;
}

function chartSVG(w){
  const W=360,H=160,pl=34,pr=10,pt=12,pb=22;
  const ys=w.map(d=>d.kg);
  const ymin=Math.min(GOAL_HIGH-2,...ys),ymax=Math.max(...ys)+1;
  const X=i=>pl+(w.length===1?0:(i/(w.length-1)))*(W-pl-pr);
  const Y=v=>pt+(1-(v-ymin)/(ymax-ymin))*(H-pt-pb);
  const pts=w.map((d,i)=>`${X(i)},${Y(d.kg)}`).join(" ");
  const goalY=Y(GOAL_HIGH);
  const ticks=[ymax,(ymax+ymin)/2,ymin].map(v=>`<text x="2" y="${Y(v)+3}" fill="#666" font-size="9" class="mono">${v.toFixed(0)}</text>`).join("");
  const dots=w.map((d,i)=>`<circle cx="${X(i)}" cy="${Y(d.kg)}" r="3" fill="#a3e635"/>`).join("");
  const xl=w.map((d,i)=>(i===0||i===w.length-1)?`<text x="${X(i)}" y="${H-6}" fill="#666" font-size="9" text-anchor="${i===0?'start':'end'}" class="mono">${d.date.slice(5)}</text>`:"").join("");
  return `<svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <line x1="${pl}" y1="${goalY}" x2="${W-pr}" y2="${goalY}" stroke="#a3e635" stroke-dasharray="4 4" opacity=".6"/>
    <polyline points="${pts}" fill="none" stroke="#a3e635" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}${ticks}${xl}
  </svg>`;
}
/* generic line chart: series=[{label,val}], opts={color} */
function lineChart(series,opts={}){
  const pts=series.filter(s=>s.val!=null&&!isNaN(s.val));
  if(pts.length<2)return `<div class="note" style="padding:8px 0">Need 2+ entries to chart.</div>`;
  const col=opts.color||"#38bdf8";
  const W=360,H=140,pl=34,pr=10,pt=12,pb=22;
  const ys=pts.map(d=>d.val);
  let ymin=Math.min(...ys),ymax=Math.max(...ys);
  if(ymin===ymax){ymin-=1;ymax+=1;}else{const pad=(ymax-ymin)*0.12;ymin-=pad;ymax+=pad;}
  const X=i=>pl+(i/(pts.length-1))*(W-pl-pr);
  const Y=v=>pt+(1-(v-ymin)/(ymax-ymin))*(H-pt-pb);
  const line=pts.map((d,i)=>`${X(i)},${Y(d.val)}`).join(" ");
  const ticks=[ymax,(ymax+ymin)/2,ymin].map(v=>`<text x="2" y="${Y(v)+3}" fill="#666" font-size="9" class="mono">${v.toFixed(1)}</text>`).join("");
  const dots=pts.map((d,i)=>`<circle cx="${X(i)}" cy="${Y(d.val)}" r="3" fill="${col}"/>`).join("");
  const xl=pts.map((d,i)=>(i===0||i===pts.length-1)?`<text x="${X(i)}" y="${H-6}" fill="#666" font-size="9" text-anchor="${i===0?'start':'end'}" class="mono">${(d.label||'').slice(5)}</text>`:"").join("");
  return `<svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <polyline points="${line}" fill="none" stroke="${col}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}${ticks}${xl}
  </svg>`;
}
/* generic bar chart: items=[{label,val}], opts={color} */
function barChart(items,opts={}){
  if(!items.length)return `<div class="note" style="padding:8px 0">No data yet.</div>`;
  const col=opts.color||"#a3e635";
  const W=360,H=130,pl=10,pr=10,pt=10,pb=22;
  const max=Math.max(1,...items.map(d=>d.val));
  const bw=(W-pl-pr)/items.length;
  const bars=items.map((d,i)=>{
    const h=(d.val/max)*(H-pt-pb);
    const x=pl+i*bw+bw*0.18,y=H-pb-h,w=bw*0.64;
    return `<rect x="${x}" y="${y}" width="${w}" height="${Math.max(0,h)}" rx="2" fill="${col}"/>`+
      `<text x="${x+w/2}" y="${H-pb-h-3}" fill="#a3a3a3" font-size="9" text-anchor="middle" class="mono">${d.val||''}</text>`+
      `<text x="${x+w/2}" y="${H-6}" fill="#666" font-size="8" text-anchor="middle" class="mono">${d.label}</text>`;
  }).join("");
  return `<svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">${bars}</svg>`;
}
/* sessions-per-week buckets (last n ISO weeks, Mon-Sun) */
function sessionsByWeek(n=8){
  const{weekStart}=weekBounds();
  const out=[];
  const mon=new Date(weekStart);
  const wk=workouts();
  for(let k=n-1;k>=0;k--){
    const s=new Date(mon);s.setDate(mon.getDate()-k*7);
    const e=new Date(s);e.setDate(s.getDate()+6);
    const ss=s.toLocaleDateString("en-CA"),ee=e.toLocaleDateString("en-CA");
    out.push({label:ss.slice(5),val:wk.filter(w=>w.date>=ss&&w.date<=ee).length});
  }
  return out;
}
/* ---------- analytics: PR / 1RM / volume ---------- */
const est1RM=(w,r)=>(w&&r)?+(w*(1+r/30)).toFixed(1):0;
/* best top-set weight & best est-1RM per exercise across all logged workouts */
function exercisePRs(){
  const map={};
  workouts().forEach(w=>w.entries.forEach(e=>{
    (e.sets||[]).forEach(s=>{
      if(s&&s.reps&&s.weight){
        const m=map[e.ex]||(map[e.ex]={weight:0,e1rm:0});
        if(s.weight>m.weight)m.weight=s.weight;
        const e1=est1RM(s.weight,s.reps);if(e1>m.e1rm)m.e1rm=e1;
      }
    });
  }));
  return map;
}
function exerciseNames(){const set=new Set();workouts().forEach(w=>w.entries.forEach(e=>set.add(e.ex)));return[...set];}
/* chronological est-1RM series for one exercise (best set per session) */
function exerciseSeries(ex){
  return workouts().slice().reverse().filter(w=>w.entries.some(e=>e.ex===ex)).map(w=>{
    const e=w.entries.find(x=>x.ex===ex);let best=0;
    (e.sets||[]).forEach(s=>{if(s&&s.reps&&s.weight)best=Math.max(best,est1RM(s.weight,s.reps));});
    return{label:w.date,val:best||null};
  });
}
const sessionVolume=entries=>entries.reduce((t,e)=>t+(e.sets||[]).reduce((a,s)=>a+((s&&s.reps&&s.weight)?s.weight*s.reps:0),0),0);
/* weekly total volume in tonnes (last n Mon-Sun weeks) */
function volumeByWeek(n=8){
  const{weekStart}=weekBounds();const mon=new Date(weekStart);const wk=workouts();const out=[];
  for(let k=n-1;k>=0;k--){
    const s=new Date(mon);s.setDate(mon.getDate()-k*7);const e=new Date(s);e.setDate(s.getDate()+6);
    const ss=s.toLocaleDateString("en-CA"),ee=e.toLocaleDateString("en-CA");
    const v=wk.filter(w=>w.date>=ss&&w.date<=ee).reduce((t,w)=>t+sessionVolume(w.entries),0);
    out.push({label:ss.slice(5),val:+(v/1000).toFixed(1)});
  }
  return out;
}
window.showExChart=ex=>{const el=document.getElementById("exChart");if(el)el.innerHTML=ex?lineChart(exerciseSeries(ex),{color:'#38bdf8'}):'';};
window.addWeight=()=>{

  const f=inp.files&&inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const max=800,scale=Math.min(1,max/Math.max(img.width,img.height));
      const c=document.createElement("canvas");
      c.width=img.width*scale;c.height=img.height*scale;
      c.getContext("2d").drawImage(img,0,0,c.width,c.height);
      const dataURL=c.toDataURL("image/jpeg",0.7);
      const next=[{date:todayStr(),dataURL},...photos()];
      LS.set("photos",next);renderPhotos();toast("Photo added");

    img.src=e.target.result;
  };
  r.readAsDataURL(f);

  const dump={};
  for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);dump[k]=localStorage.getItem(k);}

window.importData=inp=>{

  const r=new FileReader();
  r.onload=e=>{
    try{
      const obj=JSON.parse(e.target.result);

      if(!confirm("Import will overwrite current data. Continue?"))return;
      Object.keys(data).forEach(k=>localStorage.setItem(k,data[k]));

    }catch{alert("Invalid backup file.");}

  r.readAsText(f);
};

  const wkChart=w.length>1?`<div class="dash-item"><div class="dash-h">Weight (kg)</div>${chartSVG(w)}</div>`:'';
  const sess=sessionsByWeek(8);
  const sessChart=sess.some(s=>s.val>0)?`<div class="dash-item"><div class="dash-h">Sessions / week</div>${barChart(sess,{color:'#a3e635'})}</div>`:'';
  const vol=volumeByWeek(8);
  const volChart=vol.some(v=>v.val>0)?`<div class="dash-item"><div class="dash-h">Volume / week (tonnes)</div>${barChart(vol,{color:'#38bdf8'})}</div>`:'';
  const ci=LS.get("weekly_checkins",[]).slice().reverse()
    .map(c=>({label:c.week_ending,val:c.energy_avg!=null?parseFloat(c.energy_avg):null}));
  const enChart=ci.filter(c=>c.val!=null).length>1?`<div class="dash-item"><div class="dash-h">Avg energy / 5</div>${lineChart(ci,{color:'#a78bfa'})}</div>`:'';
  const body=wkChart+sessChart+volChart+enChart;
  if(!body)return '';
  return `<div class="card"><div class="label" style="color:var(--ink3);margin-bottom:10px;font-size:.72rem">Progress dashboard</div>${body}</div>`;
}

window.saveCheckin=()=>{
  const{weekEnd}=weekBounds();
  const entry={
    week_ending:weekEnd,
    weight_kg:latestWeight(),
    sessions_completed:weeklySessionCount(),
    energy_avg:weeklyEnergyAvg(),
    notes:(document.getElementById("checkinNotes")||{}).value||''
  };
  let all=LS.get("weekly_checkins",[]);
  const idx=all.findIndex(c=>c.week_ending===weekEnd);
  if(idx>=0)all[idx]=entry;else all.unshift(entry);
  LS.set("weekly_checkins",all.slice(0,52));
  toast("Check-in saved");
  renderCheckinHistory();
};

window.copyCheckin=()=>{
  const{weekEnd}=weekBounds();
  const wKg=latestWeight(),sess=weeklySessionCount(),energy=weeklyEnergyAvg();
  const notes=(document.getElementById("checkinNotes")||{}).value||'';
  const text=[
    `Week ending: ${weekEnd}`,
    `Weight: ${wKg!==null?wKg+'kg':'—'}`,
    `Sessions this week: ${sess}`,
    `Avg energy: ${energy!==null?energy+'/5':'—'}`,
    `Notes: ${notes.trim()||'—'}`
  ].join('\n');
  navigator.clipboard.writeText(text)
    .then(()=>toast("Copied to clipboard"))
    .catch(()=>{
      const ta=document.createElement("textarea");ta.value=text;
      ta.style.cssText="position:fixed;opacity:0";document.body.appendChild(ta);
      ta.select();document.execCommand("copy");ta.remove();toast("Copied");
    });
};

function renderCheckinHistory(){
  const el=document.getElementById("checkinHistory");if(!el)return;
  const all=LS.get("weekly_checkins",[]);
  if(!all.length){el.innerHTML='';return;}
  el.innerHTML=`
    <div>
      <div class="label" style="color:var(--ink3);margin-bottom:8px;font-size:.72rem">Past check-ins</div>
      ${all.map(c=>`
        <div class="card-sm" style="margin-bottom:8px">
          <div class="row" style="margin-bottom:6px">
            <span class="hist-sess">${c.week_ending}</span>
            <span class="mono" style="font-size:.72rem;color:var(--ink3)">${c.weight_kg!==null?c.weight_kg+' kg':'—'}</span>
          </div>
          <div class="hist-line" style="margin-bottom:2px">
            <span>${c.sessions_completed} session${c.sessions_completed!==1?'s':''}</span>
            <span>Energy ${c.energy_avg!==null?c.energy_avg+'/5':'—'}</span>
          </div>
          ${c.notes?`<div class="note" style="padding-top:4px;color:var(--ink3)">${c.notes.slice(0,120)}${c.notes.length>120?'…':''}</div>`:''}
        </div>`).join('')}
    </div>`;
}

/* ---------- render: PROFILE (hub) ---------- */
function renderProfile(){
  const latest=latestWeight(),total=workouts().length,wkSess=weeklySessionCount();
  const lost=latest!=null?(START_W-latest).toFixed(1):null;
  const recent=workouts().slice(0,3);
  const card=(icon,label,id,col)=>`<button class="prof-card" onclick="go('${id}')">
    <span style="color:${col}">${svg(icon,'ic')}</span><span>${label}</span></button>`;
  view().innerHTML=`
    <div class="stack">
      <div class="card">
        <div class="row" style="align-items:flex-end">
          <div>
            <div class="big">${latest!=null?latest:'—'}<span> kg</span></div>
            <div class="sub">${lost!=null?`${lost>=0?'−':''}${Math.abs(lost)} kg from start`:'Log your weight'}</div>
          </div>
          <div style="text-align:right">
            <div style="color:var(--lime);font-weight:700;font-size:.85rem">${total} workout${total!==1?'s':''}</div>
            <div style="color:var(--ink3);font-size:.72rem">${wkSess} this week</div>
          </div>
        </div>
      </div>
      <div class="prof-grid">
        ${card(I.trend,'Weight','weight','var(--lime)')}
        ${card(I.cal,'Check-in','checkin','var(--sky)')}
        ${card(I.image,'Photos','photos','var(--orange)')}
      </div>
      ${dashboardBlock()}
      <div>
        <div class="row" style="margin-bottom:8px">
          <span class="label" style="color:var(--ink3);font-size:.72rem">Recent workouts</span>
          ${total>3?`<button class="ov-toggle" onclick="go('history')">See all</button>`:''}
        </div>
        ${recent.length?recent.map(x=>{const vol=sessionVolume(x.entries);return `<button class="rec-row" onclick="go('history')">
          <span><span class="hist-sess">${x.session}</span><span class="rec-date mono">${x.date}</span></span>
          <span class="mono rec-meta">${x.durationMin?`${x.durationMin}m · `:''}${vol>0?`${+(vol/1000).toFixed(1)}t`:''}</span>
        </button>`;}).join(''):'<p class="note" style="padding-top:0">No workouts yet — start one in the Workout tab.</p>'}
      </div>
    </div>`;
}

/* ---------- tabs + history nav ---------- */
const RENDERERS={today:renderToday,lift:renderLift,weight:renderWeight,history:renderHistory,checkin:renderCheckin,photos:renderPhotos,settings:renderSettings,profile:renderProfile};
const TABBAR=[["today","Home",I.home],["lift","Workout",I.dumbbell],["history","History",I.check],["profile","Profile",I.user]];
const PROFILE_SUB=["weight","checkin","photos","settings","profile"];
const TITLES={today:"",lift:"Workout",weight:"Weight",history:"History",checkin:"Check-in",photos:"Photos",settings:"Backup",profile:"Profile"};
let navStack=[],navIndex=-1;
function renderHeader(){
  const back=navIndex>0,fwd=navIndex<navStack.length-1;
  const nav=`<div class="head-nav">
    <button class="nav-btn ${back?'':'disabled'}" ${back?'onclick="goBack()"':''}>${svg(I.back,'ic')}</button>
    <button class="nav-btn ${fwd?'':'disabled'}" ${fwd?'onclick="goForward()"':''}>${svg(I.fwd,'ic')}</button>
  </div>`;
  const title=tab==="today"
    ?`<h1 class="head-title">AFIF<span>/</span>LOG</h1>`
    :`<span class="head-title sub">${TITLES[tab]||""}</span>`;
  const right=tab==="today"?`<span class="date mono">${todayStr()}</span>`
    :tab==="profile"?`<button class="gear-btn" onclick="go('settings')">${svg(I.gear,'ic')}</button>`
    :`<span class="head-right-sp"></span>`;
  $("#appHead").innerHTML=`${nav}${title}${right}`;
}
function renderTabbar(){
  $("#tabbar").innerHTML=TABBAR.map(([id,label,icon])=>{
    const on=tab===id||(id==="profile"&&PROFILE_SUB.includes(tab));
    return `<button class="tab ${on?'on':''}" onclick="go('${id}')">${svg(icon)}<span>${label}</span></button>`;
  }).join("");
}
window.go=id=>{navStack=navStack.slice(0,navIndex+1);navStack.push(id);navIndex=navStack.length-1;tab=id;render();};
window.goBack=()=>{if(navIndex>0){navIndex--;tab=navStack[navIndex];render();}};
window.goForward=()=>{if(navIndex<navStack.length-1){navIndex++;tab=navStack[navIndex];render();}};
function render(){renderHeader();renderTabbar();(RENDERERS[tab]||renderToday)();}

/* ---------- init ---------- */
migrateWorkouts();
seedRoutines();
if(!routines()[sess])sess=routineNames()[0]||sess;
(()=>{const d=LS.get("lift_draft");if(d){if(d.sess&&routines()[d.sess])sess=d.sess;if(d.log)log=d.log;if(d.startedAt)workoutStart=d.startedAt;}})();
go("today");

if("serviceWorker" in navigator){
  window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}));
}
</script>
</body>
</html>
