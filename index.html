<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FitRack">
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icons/icon-192.png" sizes="192x192" type="image/png">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<title>FitRack</title>
<style>
  @font-face{
    font-family:'Archivo';font-style:normal;font-weight:100 900;font-display:swap;
    src:url('./fonts/archivo.woff2') format('woff2');
  }
  :root{
    --bg:#0a0a0a; --card:#171717; --border:#262626; --border2:#333;
    --ink:#f5f5f5; --ink2:#a3a3a3; --ink3:#737373; --ink4:#525252;
    --lime:#a3e635; --lime-dim:rgba(163,230,53,.10); --lime-bd:rgba(163,230,53,.40);
    --sky:#38bdf8; --orange:#fb923c; --orange-dim:rgba(251,146,60,.10); --orange-bd:rgba(251,146,60,.40);
    --emerald:#34d399; --red:#f87171; --purple:#a78bfa; --purple-dim:rgba(167,139,250,.10); --purple-bd:rgba(167,139,250,.40);
  }
  [data-theme="electric"]{
    --bg:#0b0d12; --card:#14171e; --border:#242a35; --border2:#333b48;
    --ink:#f4f6fb; --ink2:#9aa4b2; --ink3:#6b7280; --ink4:#4b5563;
    --lime:#5b8cff; --lime-dim:rgba(91,140,255,.12); --lime-bd:rgba(91,140,255,.42);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);font-family:ui-sans-serif,system-ui,-apple-system,sans-serif}
  body{min-height:100vh;padding-bottom:calc(80px + env(safe-area-inset-bottom))}
  .mono{font-family:ui-monospace,"SF Mono",Menlo,monospace}
  .arch{font-family:'Archivo',ui-sans-serif,system-ui,sans-serif}
  .wrap{max-width:28rem;margin:0 auto;padding:0 20px;padding-top:calc(24px + env(safe-area-inset-top))}
  .head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:4px;min-height:40px}
  h1{font-family:'Archivo',sans-serif;font-size:1.4rem;font-weight:900;letter-spacing:-.03em;display:flex;align-items:center;gap:8px}
  h1 .wmk{width:22px;height:22px;color:var(--lime)}
  h1 .sl{color:var(--lime)}
  .date{font-size:.75rem;color:var(--ink3)}
  .head-nav{display:flex;align-items:center;gap:6px;flex:0 0 auto}
  .nav-btn{width:32px;height:32px;border-radius:50%;background:var(--card);border:1px solid var(--border);color:var(--ink2);display:flex;align-items:center;justify-content:center}
  .nav-btn:active{background:#1f1f1f}
  .nav-btn.disabled{opacity:.3;pointer-events:none}
  .head-title{flex:1;text-align:center;font-family:'Archivo',sans-serif;font-size:1.4rem;font-weight:900;letter-spacing:-.03em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .head-title.sub{font-size:1.05rem}
  .gear-btn{width:32px;height:32px;border-radius:50%;background:var(--card);border:1px solid var(--border);color:var(--ink2);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .gear-btn:active{background:#1f1f1f}
  .edit-btn{flex:0 0 auto;display:flex;align-items:center;gap:6px;background:var(--lime-dim);border:1px solid var(--lime-bd);color:var(--lime);padding:7px 12px;border-radius:99px;font-size:.72rem;font-weight:800;letter-spacing:.02em}
  .edit-btn:active{filter:brightness(1.1)}
  .head .date,.head-right-sp{flex:0 0 auto;min-width:32px;text-align:right}
  .rule{height:1px;background:linear-gradient(to right,var(--lime-bd),transparent);margin-bottom:24px}
  .stack>*+*{margin-top:16px}
  .card{border-radius:1rem;background:var(--card);border:1px solid var(--border);padding:20px}
  .card-sm{border-radius:.75rem;background:var(--card);border:1px solid var(--border);padding:12px}
  .row{display:flex;align-items:center;justify-content:space-between}
  .label{font-weight:700;font-size:.8rem;text-transform:uppercase;letter-spacing:.04em}
  .ic{width:18px;height:18px;stroke-width:2}
  .flex{display:flex;align-items:center;gap:8px}
  .gap3{gap:12px}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,textarea,select{font-family:inherit;width:100%;background:var(--bg);border:1px solid var(--border);border-radius:.5rem;padding:8px 12px;font-size:.85rem;color:var(--ink);outline:none;appearance:none;-webkit-appearance:none}
  input:focus,textarea:focus,select:focus{border-color:var(--lime)}
  input::placeholder,textarea::placeholder{color:var(--ink4)}
  select option{background:var(--card)}
  .save{width:100%;padding:14px;border-radius:.75rem;background:var(--lime);color:var(--bg);font-weight:900;display:flex;align-items:center;justify-content:center;gap:8px}
  .save:active{filter:brightness(.92)}
  .save.off{background:var(--border);color:var(--ink4);pointer-events:none}
  /* greeting */
  .greet{display:flex;align-items:center;gap:13px}
  .greet-ic{width:44px;height:44px;flex:0 0 auto;border-radius:13px;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center}
  .greet-h{font-weight:900;font-size:1.6rem;letter-spacing:-.03em;line-height:1.05}
  .greet-sub{font-size:.75rem;color:var(--ink3);margin-top:3px}
  /* stat cards */
  .sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .stat{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:15px 16px}
  .stat-l{font-size:.6rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3)}
  .stat-n{font-family:'Archivo';font-weight:800;font-size:1.9rem;letter-spacing:-.02em;color:var(--ink);line-height:1;margin-top:9px}
  .stat-n .u{font-size:1rem;color:var(--ink3);font-weight:700}
  .stat-s{font-size:.7rem;color:var(--ink3);margin-top:6px}
  .rec{width:100%;display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px 14px;text-align:left;color:var(--ink);margin-bottom:8px}
  .rec:active{background:#1f1f1f}
  .rec:last-child{margin-bottom:0}
  .sec-l{font-size:.6rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px;display:block}
  /* lift timers */
  .lift-top{display:flex;align-items:center;gap:8px}
  .wk-dur{display:flex;align-items:center;gap:6px;flex:0 0 auto;padding:8px 10px;border-radius:.6rem;background:var(--card);border:1px solid var(--border)}
  .wk-dur .mono{font-size:.85rem;font-weight:700;color:var(--ink)}
  .rest-bar{flex:1;display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:.6rem;background:var(--card);border:1px solid var(--border);min-height:38px}
  .rest-tag{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--ink4);flex:0 0 auto}
  .rest-preset{flex:1;padding:6px 0;border-radius:.5rem;background:var(--bg);border:1px solid var(--border);color:var(--ink2);font-size:.75rem;font-weight:700}
  .rest-preset:active{background:var(--lime);color:var(--bg)}
  .rest-ctl{flex:0 0 auto;width:26px;height:26px;border-radius:50%;background:var(--bg);border:1px solid var(--border);color:var(--ink2);font-size:.7rem;display:flex;align-items:center;justify-content:center}
  .rest-clock{flex:0 0 auto;font-size:.85rem;font-weight:700;color:var(--lime);min-width:42px;text-align:center}
  .rest-prog{flex:1;height:6px;border-radius:99px;background:var(--border2);overflow:hidden}
  .rest-prog>div{height:100%;background:var(--lime);transition:width .9s linear}
  /* routine cards */
  .rgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .rcard{border-radius:14px;padding:13px 14px;border:1px solid var(--border);background:var(--card);display:flex;flex-direction:column;gap:7px;text-align:left}
  .rcard.active{border-color:var(--lime-bd);background:var(--lime-dim)}
  .rcard.locked{opacity:.5;pointer-events:none}
  .rc-name{font-weight:800;font-size:.92rem;letter-spacing:-.01em;color:var(--ink)}
  .rc-name.act{color:var(--lime)}
  .rc-status{font-size:.64rem;color:var(--ink4);display:flex;align-items:center;gap:5px}
  /* set logging */
  .ex-name{font-weight:800;font-size:.95rem;letter-spacing:-.01em;color:var(--ink)}
  .ex-cue{font-size:.64rem;color:var(--ink4);line-height:1.4;margin-top:2px}
  .ex-prev{font-size:.64rem;color:var(--ink3);margin-top:6px}
  .col-h{font-size:.56rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink4);text-align:center}
  .setrow{display:grid;grid-template-columns:34px 1fr 1fr 46px;gap:9px;align-items:center;margin-top:9px}
  .setnum{width:34px;height:34px;border-radius:9px;background:var(--bg);border:1px solid var(--border);display:grid;place-items:center;font-size:.82rem;font-weight:800;color:var(--ink2)}
  .setnum.done{background:var(--lime);color:var(--bg);border-color:var(--lime)}
  .setin{height:46px;border-radius:11px;background:var(--bg);border:1px solid var(--border);text-align:center;font-size:17px;font-weight:800;color:var(--ink);width:100%}
  .setin::placeholder{color:var(--ink4);font-weight:600}
  .setin.don{border-color:var(--lime-bd)}
  .setchk{height:46px;border-radius:11px;background:var(--bg);border:1px solid var(--border);display:grid;place-items:center;color:var(--ink4)}
  .setchk.done{background:var(--lime);border-color:var(--lime);color:var(--bg)}
  .addset{margin-top:10px;width:100%;padding:9px 0;border-radius:9px;background:var(--bg);border:1px dashed var(--border2);color:var(--ink3);font-size:.72rem;font-weight:700}
  .finish{width:100%;padding:15px;border-radius:.85rem;background:var(--lime);color:var(--bg);font-weight:900;font-size:.95rem;letter-spacing:.02em;display:flex;align-items:center;justify-content:center;gap:9px}
  .finish:active{filter:brightness(.92)}
  .edit-btn.discard{background:rgba(248,113,113,.10);border-color:rgba(248,113,113,.4);color:var(--red)}
  /* cardio + intensity */
  .field-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--ink3);margin-bottom:6px;display:block}
  .intensity-row{display:flex;gap:6px}
  .intensity-btn{flex:1;padding:9px 4px;border-radius:.5rem;font-size:.75rem;font-weight:700;background:var(--bg);border:1px solid var(--border);color:var(--ink3);text-align:center}
  .intensity-btn.on-easy{background:rgba(52,211,153,.15);border-color:rgba(52,211,153,.5);color:var(--emerald)}
  .intensity-btn.on-moderate{background:rgba(251,146,60,.15);border-color:rgba(251,146,60,.5);color:var(--orange)}
  .intensity-btn.on-hard{background:rgba(248,113,113,.15);border-color:rgba(248,113,113,.5);color:var(--red)}
  .note{font-size:.7rem;color:var(--ink4);line-height:1.5;padding-top:4px}
  .banner{font-size:.72rem;line-height:1.5;border-radius:.75rem;padding:10px 12px;border:1px solid var(--orange-bd);background:var(--orange-dim);color:#fdba74}
  /* menu rows */
  .mrow{width:100%;display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 15px;text-align:left;color:var(--ink);margin-bottom:8px}
  .mrow:active{background:#1f1f1f}
  .micon{width:38px;height:38px;flex:0 0 auto;border-radius:11px;display:grid;place-items:center}
  .mlabel{font-weight:700;font-size:.9rem;color:var(--ink);display:block}
  .msub{font-size:.68rem;color:var(--ink3);margin-top:2px;display:block}
  .mval{font-size:.76rem;color:var(--ink3)}
  /* weight */
  .big{font-size:2.5rem;font-weight:900;line-height:1;font-family:'Archivo'}
  .big span{font-size:1.1rem;color:var(--ink3);font-weight:700}
  .sub{font-size:.72rem;color:var(--ink3);margin-top:4px}
  .bar{height:8px;border-radius:99px;background:#262626;margin-top:12px;overflow:hidden}
  .bar>div{height:100%;background:linear-gradient(to right,var(--lime),var(--emerald))}
  .logbtn{padding:0 20px;border-radius:.75rem;background:var(--lime);color:var(--bg);font-weight:700}
  svg.chart{display:block;width:100%;height:160px}
  /* history */
  .hist-empty{color:var(--ink4);font-size:.85rem;text-align:center;padding:40px 0}
  .month-hd{width:100%;display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-radius:12px;background:var(--card);border:1px solid var(--border);color:var(--ink);font-weight:800;font-size:.82rem}
  .month-hd:active{background:#1f1f1f}
  .month-hd .ic{transition:transform .15s;color:var(--ink3)}
  .month-hd.open .ic{transform:rotate(90deg)}
  .month-grp .card-sm{margin-top:8px}
  .hdel{width:28px;height:28px;flex:0 0 auto;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--ink4);background:var(--bg);border:1px solid var(--border)}
  .hdel:active{color:var(--red);border-color:rgba(248,113,113,.4)}
  .hist-sess{font-weight:700;font-size:.85rem;color:var(--lime)}
  .hist-line{display:flex;justify-content:space-between;font-size:.72rem;color:var(--ink2)}
  .hist-line span:last-child{color:#d4d4d4}
  /* photos */
  .photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .photo{position:relative;border-radius:.75rem;overflow:hidden;border:1px solid var(--border);aspect-ratio:3/4;background:var(--card)}
  .photo img{width:100%;height:100%;object-fit:cover;display:block}
  .photo .pdate{position:absolute;left:6px;bottom:6px;font-size:.6rem;background:rgba(0,0,0,.7);padding:2px 6px;border-radius:4px}
  .photo .pdel{position:absolute;top:6px;right:6px;width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;color:var(--red)}
  .photo-add{border:1px dashed var(--border2);border-radius:.9rem;aspect-ratio:3/4;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--ink3);background:var(--card)}
  .capbtn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:13px 0;border-radius:.7rem;font-size:.82rem;font-weight:700}
  .capbtn.primary{background:var(--lime-dim);border:1px solid var(--lime-bd);color:var(--lime)}
  .capbtn.ghost{background:var(--card);border:1px solid var(--border);color:var(--ink2)}
  .reqbar{display:flex;align-items:center;gap:8px;padding:11px 13px;border-radius:.7rem;font-size:.72rem;line-height:1.4;font-weight:600}
  .reqbar.wait{background:var(--orange-dim);border:1px solid var(--orange-bd);color:#fdba74}
  .reqbar.ok{background:var(--lime-dim);border:1px solid var(--lime-bd);color:var(--lime)}
  .fin-preview{position:relative;border-radius:.9rem;overflow:hidden;border:1px solid var(--border);aspect-ratio:3/4;background:var(--card)}
  .fin-preview img{width:100%;height:100%;object-fit:cover;display:block}
  .fin-preview .pdate{position:absolute;left:8px;bottom:8px;font-size:.62rem;background:rgba(0,0,0,.7);padding:3px 8px;border-radius:5px;color:#fff}
  .fin-preview .pretake{position:absolute;top:8px;right:8px;display:flex;align-items:center;gap:5px;background:rgba(0,0,0,.7);padding:5px 9px;border-radius:99px;font-size:.62rem;font-weight:700;color:#fff}
  /* lightbox */
  .lb{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:50;display:flex;align-items:center;justify-content:center;padding:20px}
  .lb img{max-width:100%;max-height:90vh;border-radius:.5rem}
  /* settings buttons */
  .set-btn{width:100%;padding:14px;border-radius:.75rem;border:1px solid var(--border);background:var(--card);font-weight:700;font-size:.85rem;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--ink)}
  .set-btn:active{background:#1f1f1f}
  /* routines editor */
  .rt-block{border:1px solid var(--border);border-radius:.6rem;padding:10px 12px;margin-bottom:10px}
  .rt-ex{display:flex;align-items:center;justify-content:space-between;font-size:.78rem;color:var(--ink2);padding:4px 0;border-top:1px solid var(--border)}
  .rt-mini{padding:3px 8px;border-radius:.4rem;background:var(--bg);border:1px solid var(--border);color:var(--ink2);font-size:.66rem;font-weight:700;text-transform:capitalize}
  .rt-mini:active{background:var(--lime);color:var(--bg)}
  .rt-add{margin-top:8px;padding:6px 0;width:100%;border-radius:.5rem;background:var(--bg);border:1px dashed var(--border2);color:var(--ink3);font-size:.72rem;font-weight:700}
  /* tabbar (condensed) */
  .tabbar{position:fixed;bottom:0;left:0;right:0;background:rgba(23,23,23,.95);backdrop-filter:blur(8px);border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom)}
  [data-theme="electric"] .tabbar{background:rgba(20,23,30,.95)}
  .tabbar .inner{max-width:28rem;margin:0 auto;display:flex;justify-content:space-around;align-items:center;padding:9px 12px}
  .tabc{display:flex;align-items:center;justify-content:center;color:var(--ink3);padding:9px}
  .tabc svg{width:24px;height:24px;stroke-width:2.2}
  .tabc.on{background:var(--lime-dim);color:var(--lime);border-radius:99px;padding:9px 15px;gap:8px}
  .tabc.on span{font-size:11px;font-weight:700;letter-spacing:.03em;text-transform:uppercase}
  .tabc:not(.on) span{display:none}
  .tabbar.hide{display:none}
  .hidden{display:none}
  .chart-meta{display:flex;gap:14px;font-size:.64rem;color:var(--ink3);margin-bottom:6px}
  .chart-meta .cur{color:var(--lime);font-weight:700;margin-left:auto}
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--lime);color:var(--bg);font-weight:700;font-size:.8rem;padding:8px 16px;border-radius:99px;z-index:60;opacity:0;transition:opacity .2s}
  .toast.show{opacity:1}
  .cardio-detail{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:10px}
  .notes-area{resize:none;height:60px;font-size:.82rem;line-height:1.5}
  .dash-item{margin-bottom:14px}
  .dash-item:last-child{margin-bottom:0}
  .dash-h{font-size:.68rem;font-weight:700;color:var(--ink3);margin-bottom:4px}
  .dash-item svg.chart{height:140px}
  .bc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .bc-grid input{margin-top:2px}
  .spark{display:block}
</style>
</head>
<body>
<div class="wrap">
  <div class="head" id="appHead"></div>
  <div class="rule"></div>
  <div id="view"></div>
</div>

<nav class="tabbar"><div class="inner" id="tabbar"></div></nav>
<div class="toast" id="toast"></div>

<script>
/* ---------- icons ---------- */
const I={
  droplet:'<path d="M12 2.7s6 5.5 6 10.3a6 6 0 1 1-12 0C6 8.2 12 2.7 12 2.7Z"/>',
  dumbbell:'<path d="m6.5 6.5 11 11"/><path d="m21 21-1-1"/><path d="m3 3 1 1"/><path d="m18 22 4-4"/><path d="m2 6 4-4"/><path d="m3 10 7-7"/><path d="m14 21 7-7"/>',
  trend:'<polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/>',
  check:'<polyline points="20 6 9 17 4 12"/>',
  plus:'<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
  minus:'<line x1="5" y1="12" x2="19" y2="12"/>',
  save:'<path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>',
  cam:'<path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/>',
  trash:'<polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>',
  image:'<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.5-3.5L7 21"/>',

  _db:null,
  open(){return this._db?Promise.resolve(this._db):new Promise((res,rej)=>{const q=indexedDB.open("fitrack",1);q.onupgradeneeded=()=>{q.result.createObjectStore("photos",{keyPath:"id",autoIncrement:true});};q.onsuccess=()=>{this._db=q.result;res(this._db);};q.onerror=()=>rej(q.error);});},
  _tx(mode,fn){return this.open().then(db=>new Promise((res,rej)=>{const r=fn(db.transaction("photos",mode).objectStore("photos"));r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);}));},
  all(){return this._tx("readonly",s=>s.getAll());},
  add(p){return this._tx("readwrite",s=>s.add(p));},

  clear(){return this._tx("readwrite",s=>s.clear());}
};

/* ---------- week helpers ---------- */
function weekBounds(){
  const today=parseLocal(todayStr());const dow=today.getDay();const diffToMon=dow===0?-6:1-dow;
  const mon=new Date(today);mon.setDate(today.getDate()+diffToMon);const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  const fmt=d=>d.toLocaleDateString("en-CA");return{weekStart:fmt(mon),weekEnd:fmt(sun)};
}
function weeklySessionCount(){const{weekStart,weekEnd}=weekBounds();return workouts().filter(w=>w.date>=weekStart&&w.date<=weekEnd).length;}
function latestWeight(){const w=weights();return w.length?w[w.length-1].kg:null;}
function monthCount(){const m=todayStr().slice(0,7);return workouts().filter(w=>w.date.slice(0,7)===m).length;}
function computeStreak(){
  const set=new Set(workouts().map(w=>w.date));const fmt=d=>d.toLocaleDateString("en-CA");
  let d=parseLocal(todayStr());
  if(!set.has(fmt(d))){d.setDate(d.getDate()-1);if(!set.has(fmt(d)))return 0;}
  let n=0;while(set.has(fmt(d))){n++;d.setDate(d.getDate()-1);}return n;
}

/* ---------- migration ---------- */
/* One-shot: surface pre-rebuild cardio (stored inside daily:* objects) in the Cardio tab. */
function migrateCardio(){
  if(LS.get("cardio_migrated"))return;
  const existing=cardioSessions();const have=new Set(existing.map(c=>c.date));const found=[];
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);if(!k||!k.startsWith("daily:"))continue;
    const d=LS.get(k);if(!d||!d.cardio)continue;
    const c=d.cardio;if(!(c===true||c.done))continue;
    const date=k.slice(6);if(have.has(date))continue;
    const o=typeof c==="object"?c:{};
    found.push({date,type:o.type||"other",duration_min:o.duration_min||null,intensity:o.intensity||"easy",run_ratio:o.run_ratio||null});
  }
  if(found.length)LS.set("cardio_sessions",[...found,...existing].sort((a,b)=>b.date.localeCompare(a.date)));
  LS.set("cardio_migrated",true);
}
function migrateWorkouts(){
  const all=workouts();let changed=false;
  const migrated=all.map(w=>({...w,entries:w.entries.map(e=>{
    if(!e.sets&&e.reps){const m=e.reps.match(/(\d+)\s*[x×]\s*(\d+)/i);if(m){changed=true;const r=parseInt(m[2]);const wt=parseFloat(e.weight)||null;return{ex:e.ex,weight:wt,sets:[{weight:wt,reps:r},{weight:wt,reps:r},{weight:wt,reps:r}]};}}
    if(e.sets&&e.sets.some(s=>s&&s.weight===undefined)){changed=true;return{...e,sets:e.sets.map(s=>s?{...s,weight:s.weight===undefined?(e.weight??null):s.weight}:s)};}
    return e;
  })}));
  if(changed)LS.set("workouts",migrated);
}

/* ---------- charts ---------- */
/* Gradient ids must be unique per chart instance — the dashboard renders several on one page,
   and duplicate SVG ids silently break every fill after the first. */
let gradSeq=0;
function chartGrad(col){const id="cg"+(gradSeq++);return{id,def:`<defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${col}" stop-opacity=".28"/><stop offset="1" stop-color="${col}" stop-opacity="0"/></linearGradient></defs>`};}
function xLabelIdx(n){return n<2?[0]:[...new Set([0,Math.round((n-1)/3),Math.round(2*(n-1)/3),n-1])];}
function lineChartBody(pts,val,lab,{col,W,H,pl,pr,pt,pb,ymin,ymax,dec}){
  const n=pts.length;
  const X=i=>pl+(n===1?0:(i/(n-1)))*(W-pl-pr);const Y=v=>pt+(1-(v-ymin)/(ymax-ymin))*(H-pt-pb);
  const g=chartGrad(col);
  const grid=[ymax,(ymax+ymin)/2,ymin].map(v=>`<line x1="${pl}" y1="${Y(v)}" x2="${W-pr}" y2="${Y(v)}" stroke="var(--border)" stroke-width="1"/>`).join("");
  const ticks=[ymax,(ymax+ymin)/2,ymin].map(v=>`<text x="2" y="${Y(v)+3}" fill="var(--ink3)" font-size="9" class="mono">${v.toFixed(dec)}</text>`).join("");
  const line=pts.map((d,i)=>`${X(i)},${Y(val(d))}`).join(" ");
  const area=`<path d="M${pts.map((d,i)=>`${X(i)},${Y(val(d))}`).join(" L")} L${X(n-1)},${H-pb} L${X(0)},${H-pb} Z" fill="url(#${g.id})"/>`;
  const dots=n<=14?pts.slice(0,-1).map((d,i)=>`<circle cx="${X(i)}" cy="${Y(val(d))}" r="2.5" fill="${col}"/>`).join(""):"";
  const lx=X(n-1),ly=Y(val(pts[n-1]));
  const last=`<circle cx="${lx}" cy="${ly}" r="7" fill="${col}" opacity=".18"/><circle cx="${lx}" cy="${ly}" r="3.5" fill="${col}"/><text x="${Math.min(lx,W-pr-2)}" y="${Math.max(ly-8,pt+8)}" fill="var(--ink)" font-size="10" font-weight="700" text-anchor="end" class="mono">${val(pts[n-1]).toFixed(dec)}</text>`;
  const xl=xLabelIdx(n).map(i=>`<text x="${X(i)}" y="${H-6}" fill="var(--ink3)" font-size="9" text-anchor="${i===0?'start':i===n-1?'end':'middle'}" class="mono">${lab(pts[i])}</text>`).join("");
  return{X,Y,svg:`${g.def}${grid}${area}<polyline points="${line}" fill="none" stroke="${col}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>${dots}${last}${ticks}${xl}`};
}
function chartSVG(w){
  const W=360,H=160,pl=34,pr=10,pt=12,pb=22;const goal=goalKg();const ys=w.map(d=>d.kg);
  const ymin=Math.min(goal-2,...ys),ymax=Math.max(...ys)+1;
  const b=lineChartBody(w,d=>d.kg,d=>d.date.slice(5),{col:"var(--lime)",W,H,pl,pr,pt,pb,ymin,ymax,dec:0});
  const goalY=b.Y(goal);
  const goalLine=`<line x1="${pl}" y1="${goalY}" x2="${W-pr}" y2="${goalY}" stroke="var(--lime)" stroke-dasharray="4 4" opacity=".6"/><text x="${W-pr}" y="${goalY-4}" fill="var(--lime)" font-size="8" text-anchor="end" opacity=".8" class="mono">goal ${goal}</text>`;
  const mn=Math.min(...ys),mx=Math.max(...ys);
  return `<div><div class="chart-meta mono"><span>min ${mn}</span><span>max ${mx}</span><span class="cur">now ${ys[ys.length-1]} kg</span></div><svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">${goalLine}${b.svg}</svg></div>`;
}
function lineChart(series,opts={}){
  const pts=series.filter(s=>s.val!=null&&!isNaN(s.val));if(pts.length<2)return `<div class="note" style="padding:8px 0">Need 2+ entries to chart.</div>`;
  const col=opts.color||"var(--sky)";const W=360,H=140,pl=34,pr=10,pt=12,pb=22;const ys=pts.map(d=>d.val);let ymin=Math.min(...ys),ymax=Math.max(...ys);
  if(ymin===ymax){ymin-=1;ymax+=1;}else{const pad=(ymax-ymin)*0.12;ymin-=pad;ymax+=pad;}
  const b=lineChartBody(pts,d=>d.val,d=>(d.label||'').slice(5),{col,W,H,pl,pr,pt,pb,ymin,ymax,dec:1});
  return `<svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">${b.svg}</svg>`;
}
function barChart(items,opts={}){
  if(!items.length)return `<div class="note" style="padding:8px 0">No data yet.</div>`;
  const col=opts.color||"var(--lime)";const W=360,H=130,pl=10,pr=10,pt=10,pb=22;const max=Math.max(1,...items.map(d=>d.val));const bw=(W-pl-pr)/items.length;
  const bars=items.map((d,i)=>{const h=(d.val/max)*(H-pt-pb);const x=pl+i*bw+bw*0.18,y=H-pb-h,w=bw*0.64;
    return `<rect x="${x}" y="${pt}" width="${w}" height="${H-pt-pb}" rx="4" fill="var(--border)" opacity=".35"/>`
      +(h>0?`<rect x="${x}" y="${y}" width="${w}" height="${Math.max(0,h)}" rx="4" fill="${col}"/>`:'')
      +`<text x="${x+w/2}" y="${H-pb-h-4}" fill="var(--ink2)" font-size="9" text-anchor="middle" class="mono">${d.val||''}</text><text x="${x+w/2}" y="${H-6}" fill="var(--ink3)" font-size="8" text-anchor="middle" class="mono">${d.label}</text>`;}).join("");
  return `<svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none"><line x1="${pl}" y1="${H-pb}" x2="${W-pr}" y2="${H-pb}" stroke="var(--border)" stroke-width="1"/>${bars}</svg>`;
}
function sparkSVG(vals){
  const v=vals.slice(-8);if(v.length<2)return '';const W=128,H=52,p=6;const mn=Math.min(...v),mx=Math.max(...v);const rng=(mx-mn)||1;
  const X=i=>p+(i/(v.length-1))*(W-2*p);const Y=x=>p+(1-(x-mn)/rng)*(H-2*p);
  const line=v.map((x,i)=>`${X(i)},${Y(x)}`).join(" ");
  const g=chartGrad("var(--lime)");
  const area=`<path d="M${v.map((x,i)=>`${X(i)},${Y(x)}`).join(" L")} L${X(v.length-1)},${H-p} L${X(0)},${H-p} Z" fill="url(#${g.id})"/>`;
  return `<svg class="spark" width="128" height="52" viewBox="0 0 ${W} ${H}">${g.def}${area}<polyline points="${line}" fill="none" stroke="var(--lime)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="${X(v.length-1)}" cy="${Y(v[v.length-1])}" r="3.5" fill="var(--lime)"/></svg>`;
}

function greeting(){
  const h=new Date().getHours();
  if(h<12)return{part:"Morning",icon:I.sunrise,tint:"var(--orange)",sub:"Ready to train?"};
  if(h<18)return{part:"Afternoon",icon:I.sun,tint:"var(--orange)",sub:"Keep the momentum"};
  return{part:"Evening",icon:I.moon,tint:"var(--purple)",sub:"One more set, or rest up"};
}

/* ---------- render: HOME (dashboard) ---------- */
function backupNudge(){
  const records=workouts().length+weights().length+cardioSessions().length;
  if(records<3)return '';
  const last=LS.get("last_export");
  const days=last?Math.round((parseLocal(todayStr())-parseLocal(last))/86400000):null;
  if(last&&days<=30)return '';
  return `<div class="banner">${last?`Last backup was ${days} days ago`:`No backup yet`} — your data lives only on this device. <button onclick="go('settings')" style="color:#fdba74;font-weight:800;text-decoration:underline">Export now</button></div>`;
}
function renderToday(){
  const g=greeting();
  const wts=weights();const latestW=wts.length?wts[wts.length-1].kg:null;
  let deltaHTML="";
  if(wts.length>1){
    const cutoff=parseLocal(todayStr());cutoff.setDate(cutoff.getDate()-7);const cs=cutoff.toLocaleDateString("en-CA");
    let prev=wts[0];for(const x of wts){if(x.date<=cs)prev=x;}
    const d=+(latestW-prev.kg).toFixed(1);
    deltaHTML=`<div style="font-size:.75rem;font-weight:700;color:var(--lime);margin-top:8px">${d<0?'▼':d>0?'▲':'•'} ${Math.abs(d)} kg this week</div>`;
  }
  const niceDate=new Date().toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
  const thisWeek=weeklySessionCount(),total=workouts().length,streak=computeStreak(),month=monthCount();
  view().innerHTML=`
  <div class="stack">
    <div class="greet">
      <span class="greet-ic" style="color:${g.tint}">${svg(g.icon,'ic')}</span>
      <div><div class="arch greet-h">${g.part}, <span style="color:var(--lime)">${esc(userName())}</span></div><div class="greet-sub">${g.sub} · ${niceDate}</div></div>
    </div>
    ${backupNudge()}
    <div class="sgrid">
      <div class="stat"><div class="stat-l">This week</div><div class="stat-n">${thisWeek}<span class="u"> /4</span></div><div class="stat-s">sessions logged</div></div>
      <div class="stat"><div class="stat-l">Streak</div><div class="stat-n" style="color:var(--lime);display:flex;align-items:center;gap:6px">${streak}${flameSVG(20,'var(--orange)')}</div><div class="stat-s">days in a row</div></div>
      <div class="stat"><div class="stat-l">This month</div><div class="stat-n">${month}</div><div class="stat-s">sessions</div></div>
      <div class="stat"><div class="stat-l">All time</div><div class="stat-n">${total}</div><div class="stat-s">total sessions</div></div>
    </div>
    <div class="stat" style="padding:16px 18px">
      <div style="display:flex;align-items:flex-start;justify-content:space-between">
        <div><div class="stat-l">Weight</div><div class="stat-n" style="font-size:2.1rem;margin-top:10px">${latestW!=null?latestW:'—'}<span class="u"> kg</span></div>${deltaHTML}</div>
        ${sparkSVG(wts.map(w=>w.kg))}
      </div>
    </div>
    ${dashboardBlock()||'<p class="note" style="padding-top:0">No workouts yet — start one in the Workout tab.</p>'}
  </div>`;
}

/* ---------- render: CARDIO ---------- */
window.cdType=v=>{const d=$("#cdDur");if(d)cardioDraft.dur=d.value;const r=$("#cdRatio");if(r)cardioDraft.ratio=r.value;cardioDraft.type=v;renderCardio();};
window.cdIntensity=v=>{cardioDraft.intensity=v;document.querySelectorAll('.intensity-btn[data-i]').forEach(el=>{el.className='intensity-btn'+(el.dataset.i===v?` on-${v}`:'');});};
window.delCardio=i=>{

window.saveCardio=()=>{

/* ---------- timers ---------- */
const fmtClock=s=>{const m=Math.floor(s/60),ss=s%60;return m+":"+String(ss).padStart(2,"0");};
/* AudioContext must be created inside a user gesture or iOS keeps it muted — armed in restStart. */
function armAudio(){try{const A=window.AudioContext||window.webkitAudioContext;if(!audioCtx)audioCtx=new A();if(audioCtx.state==="suspended")audioCtx.resume();}catch{}}
function restDone(){if(navigator.vibrate)navigator.vibrate([200,100,200]);try{if(!audioCtx)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.value=880;g.gain.value=.1;o.start();setTimeout(()=>{try{o.stop();}catch{}},260);}catch{}}
/* Remaining time derives from a wall-clock deadline, so backgrounded/throttled intervals can't drift it. */
function restRemaining(){if(restPaused!=null)return restPaused;if(!restEndsAt)return 0;return Math.max(0,Math.ceil((restEndsAt-Date.now())/1000));}
function runRest(){if(restTimer)clearInterval(restTimer);restTimer=setInterval(()=>{if(restRemaining()<=0){clearInterval(restTimer);restTimer=null;restEndsAt=0;restTotal=0;restDone();}updateRestBar();},500);updateRestBar();}
window.restStart=sec=>{armAudio();restTotal=sec;restEndsAt=Date.now()+sec*1000;restPaused=null;runRest();};
window.restToggle=()=>{
  if(restPaused!=null){armAudio();restEndsAt=Date.now()+restPaused*1000;restPaused=null;runRest();}
  else if(restEndsAt){restPaused=restRemaining();if(restTimer)clearInterval(restTimer);restTimer=null;restEndsAt=0;updateRestBar();}
};
window.restReset=()=>{if(restTimer)clearInterval(restTimer);restTimer=null;restEndsAt=0;restPaused=null;restTotal=0;updateRestBar();};
function restBarHTML(){
  const rem=restRemaining();
  if(restEndsAt||restPaused!=null){const pct=restTotal?(rem/restTotal)*100:0;return `<button class="rest-ctl" aria-label="${restPaused!=null?'Resume':'Pause'} rest timer" onclick="restToggle()">${restPaused!=null?'▶':'❚❚'}</button><span class="rest-clock mono">${fmtClock(rem)}</span><div class="rest-prog"><div style="width:${pct}%"></div></div><button class="rest-ctl" aria-label="Cancel rest timer" onclick="restReset()">✕</button>`;}
  return `<span class="rest-tag">Rest</span>`+[60,90,120].map(s=>`<button class="rest-preset" onclick="restStart(${s})">${s}s</button>`).join("");
}
document.addEventListener("visibilitychange",()=>{if(!document.hidden){updateRestBar();updateDurLabel();}});
function updateRestBar(){const el=document.getElementById("restBar");if(el)el.innerHTML=restBarHTML();}
function updateDurLabel(){const el=document.getElementById("wkDur");if(el)el.textContent=workoutStart?fmtClock(Math.floor((Date.now()-workoutStart)/1000)):"0:00";}
function ensureDurTimer(){if(!durTimer)durTimer=setInterval(updateDurLabel,1000);}

/* ---------- render: WORKOUT ---------- */
function monthOneBanner(){const w=workouts();if(!w.length)return true;const first=w[w.length-1].date;const days=(parseLocal(todayStr())-parseLocal(first))/86400000;return days<28;}
const exAt=idx=>{const e=routineExercises(sess)[idx];return e?e[0]:null;};
function getLog(ex){let l=log[ex];if(!l){l={sets:[{w:'',r:''},{w:'',r:''},{w:'',r:''}],done:[false,false,false]};}if(!l.sets)l.sets=[{w:'',r:''},{w:'',r:''},{w:'',r:''}];if(!l.done)l.done=l.sets.map(()=>false);return l;}
function prevText(ex){
  const w=workouts();for(const s of w){const e=s.entries.find(x=>x.ex===ex);if(e){const reps=(e.sets||[]).filter(x=>x&&x.reps).map(x=>x.reps);if(reps.length)return `Previous · ${e.weight||'–'}kg × ${reps.join(', ')}`;}}
  return "";
}
function renderRoutineSel(){
  const el=document.getElementById("routineSel");if(!el)return;const names=routineNames();
  el.innerHTML=`<div class="rgrid">${names.map((n,idx)=>`<button class="rcard ${sess===n?'active':''}" onclick="pickSess(${idx})"><span class="rc-name ${sess===n?'act':''}">${esc(n)}</span><span class="rc-status">${routineExercises(n).length} exercises · tap to select</span></button>`).join("")}</div>`;
}
function exerciseCard(ex,cue,idx){
  const l=getLog(ex);const prev=prevText(ex);
  const rows=l.sets.map((s,i)=>{const done=l.done[i];return `<div class="setrow"><span class="setnum ${done?'done':''}">${i+1}</span><input class="setin ${done?'don':''}" inputmode="decimal" placeholder="kg" value="${esc(s.w||'')}" oninput="setLog(${idx},${i},'w',this.value)"><input class="setin ${done?'don':''}" inputmode="numeric" placeholder="reps" value="${esc(s.r||'')}" oninput="setLog(${idx},${i},'r',this.value)"><button class="setchk ${done?'done':''}" aria-label="Mark set ${i+1} done" onclick="toggleDone(${idx},${i})">${svg(I.check,'ic')}</button></div>`;}).join("");
  return `<div class="card"><div class="ex-name">${esc(ex)}</div><div class="ex-cue">${esc(cue)}</div>${prev?`<div class="ex-prev mono">${esc(prev)}</div>`:''}<div class="setrow" style="margin-top:14px"><span class="col-h">Set</span><span class="col-h">kg</span><span class="col-h">Reps</span><span class="col-h">✓</span></div>${rows}<button class="addset" onclick="addSet(${idx})">+ Add set</button></div>`;
}
function renderLift(){
  const names=routineNames();
  if(!names.length){view().innerHTML=`<div class="stack"><p class="hist-empty">No routines yet. Tap Routines to add one.</p></div>`;return;}
  if(!routines()[sess])sess=names[0];
  const banner=monthOneBanner()?`<div class="banner">Month 1: leave 1-2 reps in the tank. No training to failure (anemia).</div>`:"";
  if(!workoutStart){
    /* Pre-start: routine picker + explicit Start CTA. Exercises stay hidden until the session begins. */
    view().innerHTML=`
    <div class="stack">
      ${banner}
      <div id="routineWrap"><div class="sec-l">Routine</div><div id="routineSel"></div></div>
      <button class="save" onclick="startWorkout()">${svg(I.zap,'ic')} START ${esc(sess.toUpperCase())}</button>
      <p class="note">Pick a routine, then hit start. The timer and exercises unlock once you begin — you can discard anytime from the top bar.</p>
    </div>`;
    renderRoutineSel();
    return;
  }
  /* Focus mode: tab bar hidden (chromeHidden), no routine grid, Finish sits at the natural scroll bottom. */
  view().innerHTML=`
    <div class="stack">
      ${banner}
      <div class="lift-top"><div class="wk-dur"><span class="rest-tag">Time</span><span id="wkDur" class="mono">0:00</span></div><div id="restBar" class="rest-bar"></div></div>
      <div class="flex" style="gap:8px;color:var(--lime)"><span style="width:8px;height:8px;border-radius:50%;background:var(--lime)"></span><span class="sec-l" style="margin-bottom:0;color:var(--lime)">${esc(sess)} · in progress</span></div>
      ${routineExercises(sess).map(([ex,cue],idx)=>exerciseCard(ex,cue,idx)).join("")}
      <button class="finish" onclick="finishWorkout()">${svg(I.check,'ic')} FINISH WORKOUT</button>
    </div>`;
  ensureDurTimer();updateDurLabel();updateRestBar();
}
function saveDraft(){LS.set("lift_draft",{sess,log,startedAt:workoutStart});}
window.startWorkout=()=>{
  if(!routineExercises(sess).length){toast("This routine has no exercises");return;}
  workoutStart=Date.now();saveDraft();ensureDurTimer();render(); /* full render: header/tabbar switch to focus mode */
};
window.discardWorkout=()=>{
  if(!confirm("Discard this workout? All logged sets will be lost."))return;
  LS.del("lift_draft");log={};workoutStart=null;restReset();render();
};
window.pickSess=idx=>{const s=routineNames()[idx];if(s==null)return;if(workoutStart&&s!==sess)return;sess=s;saveDraft();renderLift();};
/* oninput handler — must NOT re-render (would replace the focused input and close the mobile keyboard). */
window.setLog=(idx,i,field,val)=>{
  const ex=exAt(idx);if(!ex)return;
  const l=getLog(ex);l.sets[i][field]=val;log[ex]=l;saveDraft();
};
window.toggleDone=(idx,i)=>{const ex=exAt(idx);if(!ex)return;const l=getLog(ex);l.done[i]=!l.done[i];log[ex]=l;saveDraft();renderLift();};
window.addSet=idx=>{const ex=exAt(idx);if(!ex)return;const l=getLog(ex);l.sets.push({w:'',r:''});l.done.push(false);log[ex]=l;saveDraft();renderLift();};
window.finishWorkout=()=>{
  const any=routineExercises(sess).some(([ex])=>(getLog(ex).sets||[]).some(s=>s&&s.r));
  if(!any){toast("Log a set first");return;}
  pendingPhoto=null;go("finishgate");
};
function commitWorkout(){
  const entries=routineExercises(sess).map(([ex])=>{
    const l=getLog(ex);const sets=(l.sets||[]).map(s=>({weight:s&&s.w?parseFloat(s.w):null,reps:s&&s.r?parseInt(s.r):null})).filter(s=>s.reps!=null);
    if(!sets.length)return null;const weight=sets[0].weight;return{ex,weight,sets};
  }).filter(Boolean);
  if(!entries.length){toast("Nothing logged");return;}
  const durationMin=workoutStart?Math.max(1,Math.round((Date.now()-workoutStart)/60000)):null;
  const rec={date:todayStr(),session:sess,entries};if(durationMin!=null)rec.durationMin=durationMin;
  const prevPRs=exercisePRs();
  if(!LS.set("workouts",[rec,...workouts()])){toast("Save failed — workout kept as draft");return;}
  let prCount=0;
  entries.forEach(e=>{let bw=0,be=0;(e.sets||[]).forEach(s=>{if(s&&s.reps&&s.weight){bw=Math.max(bw,s.weight);be=Math.max(be,est1RM(s.weight,s.reps));}});const p=prevPRs[e.ex]||{weight:0,e1rm:0};if(bw>p.weight||be>p.e1rm)prCount++;});
  LS.del("lift_draft");log={};workoutStart=null;restReset();
  go("history");toast(prCount?`🏆 ${prCount} new PR${prCount>1?'s':''}!`:"Saved "+rec.session);
}

/* ---------- render: FINISH GATE ---------- */
window.addFinishPhoto=inp=>{
  const f=inp.files&&inp.files[0];if(!f)return;const r=new FileReader();
  r.onload=e=>{const img=new Image();img.onload=()=>{const max=800,scale=Math.min(1,max/Math.max(img.width,img.height));const c=document.createElement("canvas");c.width=img.width*scale;c.height=img.height*scale;c.getContext("2d").drawImage(img,0,0,c.width,c.height);pendingPhoto=c.toDataURL("image/jpeg",0.7);renderFinishGate();};img.src=e.target.result;};
  r.readAsDataURL(f);
};
window.saveFinish=async()=>{
  if(!pendingPhoto)return;
  try{await photosReady;await PDB.add({date:todayStr(),dataURL:pendingPhoto});}
  catch(e){alert("Could not save the photo — please try again.");return;}
  pendingPhoto=null;commitWorkout();
};
function renderFinishGate(){
  if(!workoutStart){go('lift');return;}
  view().innerHTML=`
  <div class="stack">
    <p class="note" style="padding-top:0">Front / side / back, same light &amp; pose. Stored only on this device — required to log the session.</p>
    <input type="file" accept="image/*" capture="environment" id="finCam" class="hidden" onchange="addFinishPhoto(this)">
    <input type="file" accept="image/*" id="finGal" class="hidden" onchange="addFinishPhoto(this)">
    ${pendingPhoto?`
      <div class="fin-preview"><img src="${pendingPhoto}"><button class="pretake" onclick="document.getElementById('finGal').click()">${svg(I.retake,'ic')}Retake</button><span class="pdate mono">${todayStr().slice(5)}</span></div>
      <div class="reqbar ok">${svg(I.check,'ic')}Photo added — ready to save.</div>
      <button class="save" onclick="saveFinish()">${svg(I.check,'ic')} SAVE WORKOUT</button>
    `:`
      <div class="photo-add">${svg(I.cam,'ic')}<span style="font-size:.78rem;font-weight:600">No photo yet</span></div>
      <div class="flex gap3">
        <button class="capbtn primary" onclick="document.getElementById('finCam').click()">${svg(I.cam,'ic')}Take photo</button>
        <button class="capbtn ghost" onclick="document.getElementById('finGal').click()">${svg(I.image,'ic')}Gallery</button>
      </div>
      <div class="reqbar wait">${svg(I.alert,'ic')}A progress photo is required to save this session.</div>
      <button class="save off">${svg(I.save,'ic')} SAVE WORKOUT</button>
    `}
    <button class="set-btn" onclick="go('lift')">Back to workout</button>
  </div>`;
}

/* ---------- render: WEIGHT ---------- */
function renderWeight(){
  const w=weights();const start=startW(),goal=goalKg();const latest=w.length?w[w.length-1].kg:null;
  const hasProg=latest!=null&&start!=null;
  const lost=hasProg?(start-latest).toFixed(1):null;const toGoal=hasProg?(latest-goal).toFixed(1):null;
  const pct=hasProg&&start!==goal?Math.min(100,Math.max(0,((start-latest)/(start-goal))*100)):0;
  const goalTxt=profile()&&profile().goal_kg!=null?`Goal ${goal}`:`Goal ${GOAL_LOW}-${GOAL_HIGH}`;
  view().innerHTML=`
    <div class="stack">
      <div class="card">
        <div class="row" style="align-items:flex-end">
          <div><div class="big">${latest!=null?latest:'—'}<span> kg</span></div><button class="sub" style="display:block" onclick="editGoal()">Start ${start} · ${goalTxt} ${svg(I.pencil,'ic').replace('class="ic"','class="ic" style="width:11px;height:11px;vertical-align:-1px"')}</button></div>
          ${hasProg?`<div style="text-align:right"><div style="color:var(--lime);font-weight:700;font-size:.85rem">${lost>=0?'−':''}${Math.abs(lost)} kg lost</div><div style="color:var(--ink3);font-size:.72rem">${toGoal>0?`${toGoal} kg to go`:'goal reached!'}</div></div>`:''}
        </div>
        ${hasProg?`<div class="bar"><div style="width:${pct}%"></div></div>`:''}
      </div>
      ${w.length>1?`<div class="card-sm" style="padding:12px">${chartSVG(w)}</div>`:''}
      <div class="flex gap3"><input id="newW" inputmode="decimal" placeholder="today's weight (kg)"><button class="logbtn" onclick="addWeight()">Log</button></div>
      <p class="note">Weigh weekly, mornings. Watch the trend, not daily noise.</p>
      ${bodyCompBlock()}
    </div>`;
}
function bodyCompBlock(){
  const scans=bodyComps().slice().sort((a,b)=>a.date.localeCompare(b.date));const latest=scans[scans.length-1];
  const charts=[['Body fat %','body_fat_pct','var(--orange)'],['Visceral fat','visceral_fat_level','var(--red)'],['Muscle (kg)','muscle_kg','var(--emerald)']].map(([h,k,c])=>{const s=scans.map(x=>({label:x.date,val:x[k]!=null?+x[k]:null}));return s.filter(p=>p.val!=null).length>1?`<div class="dash-item"><div class="dash-h">${h}</div>${lineChart(s,{color:c})}</div>`:'';}).join('');
  return `<div class="card" style="padding:16px 20px">
    <div class="flex" style="color:var(--emerald);margin-bottom:12px">${svg(I.trend,'ic')}<span class="label">Body composition</span></div>
    ${latest?`<div class="hist-line" style="padding:4px 0;border-bottom:1px solid var(--border)"><span style="color:var(--ink3)">Latest (${latest.date})</span><span class="mono">${latest.body_fat_pct!=null?latest.body_fat_pct+'% fat':'—'}</span></div>`:''}
    <div class="bc-form" style="margin-top:12px"><div class="bc-grid">
      <label class="field-label">Date<input type="date" id="bcDate" value="${todayStr()}"></label>
      <label class="field-label">Body fat %<input id="bcBf" inputmode="decimal" placeholder="e.g. 24.5"></label>
      <label class="field-label">Visceral level<input id="bcVf" inputmode="decimal" placeholder="e.g. 8"></label>

window.exportData=async()=>{
  const dump={};for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);dump[k]=localStorage.getItem(k);}
  let ph=[];try{await photosReady;ph=await PDB.all();}catch{}

  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="fitrack-backup-"+todayStr()+".json";a.click();URL.revokeObjectURL(a.href);

window.importData=inp=>{const f=inp.files&&inp.files[0];if(!f)return;const r=new FileReader();r.onload=async e=>{
  try{
    const obj=JSON.parse(e.target.result);const data=obj.data||obj;
    const KNOWN=["weights","workouts","routines","weekly_checkins","body_comp_scans","cardio_sessions","photos","lift_draft","theme","profile"];
    const looksValid=obj._app==="fitrack"||obj._app==="afiflog"||(data&&typeof data==="object"&&Object.keys(data).some(k=>KNOWN.includes(k)||k.startsWith("daily:")));
    if(!looksValid){alert("This doesn't look like a FitRack backup file.");return;}
    if(!confirm("Import will overwrite current data. Continue?"))return;
    /* photos: v3 keeps them top-level; v1/v2 backups have them as a JSON string inside the localStorage dump */
    let ph=Array.isArray(obj.photos)?obj.photos:null;
    if(!ph&&data.photos){try{const p=typeof data.photos==="string"?JSON.parse(data.photos):data.photos;if(Array.isArray(p))ph=p;}catch{}}
    Object.keys(data).forEach(k=>{if(k!=="photos")localStorage.setItem(k,data[k]);});
    if(ph){await PDB.clear();for(const p of ph.slice().reverse())await PDB.add({date:p.date,dataURL:p.dataURL});}
    location.reload();
  }catch{alert("Invalid backup file.");}
};r.readAsText(f);};

/* ---------- render: ONBOARDING (first run) ---------- */
let obStep=0,obName="";
function obDots(){return `<div style="display:flex;justify-content:center;gap:6px">${[0,1,2].map(i=>`<span style="width:${i===obStep?18:6}px;height:6px;border-radius:99px;background:${i===obStep?'var(--lime)':'var(--border2)'};transition:width .2s"></span>`).join("")}</div>`;}
function renderOnboard(){
  let body;
  if(obStep===0)body=`
    <div style="text-align:center;padding-top:28px"><span style="display:inline-flex;width:76px;height:76px;border-radius:22px;background:var(--lime-dim);border:1px solid var(--lime-bd);align-items:center;justify-content:center;color:var(--lime)">${markSVG('wmk').replace('class="wmk"','class="wmk" style="width:40px;height:40px"')}</span>
    <div class="arch" style="font-size:1.9rem;font-weight:900;letter-spacing:-.03em;margin-top:18px">Welcome to Fit<span style="color:var(--lime)">Rack</span></div>
    <p class="note" style="padding-top:8px">Your private fitness tracker. Everything stays on this device — no account, works offline.</p></div>
    <div style="margin-top:8px">
      <div class="mrow" style="pointer-events:none"><span class="micon" style="background:var(--lime-dim);color:var(--lime)">${svg(I.dumbbell,'ic')}</span><span style="flex:1"><span class="mlabel">Log workouts</span><span class="msub">Sets, reps &amp; automatic progression</span></span></div>
      <div class="mrow" style="pointer-events:none"><span class="micon" style="background:rgba(56,189,248,.12);color:var(--sky)">${svg(I.trend,'ic')}</span><span style="flex:1"><span class="mlabel">Track progress</span><span class="msub">Weight, cardio &amp; body-comp trends</span></span></div>
      <div class="mrow" style="pointer-events:none"><span class="micon" style="background:rgba(251,146,60,.12);color:var(--orange)">${svg(I.cam,'ic')}</span><span style="flex:1"><span class="mlabel">Progress photos</span><span class="msub">Stored only on your device</span></span></div>
    </div>
    <button class="save" onclick="obNext()">${svg(I.zap,'ic')} GET STARTED</button>`;
  else if(obStep===1)body=`
    <div style="padding-top:28px"><div class="arch" style="font-size:1.6rem;font-weight:900;letter-spacing:-.02em">What's your name?</div>
    <p class="note" style="padding-top:6px">Used for your greeting and profile. You can change it anytime in Profile.</p></div>
    <input id="obName" placeholder="Your name" maxlength="30" value="${esc(obName)}" autocomplete="given-name">
    <button class="save" onclick="obNext()">CONTINUE</button>
    <button class="set-btn" onclick="obBack()">Back</button>`;
  else body=`
    <div style="padding-top:28px"><div class="arch" style="font-size:1.6rem;font-weight:900;letter-spacing:-.02em">Set a goal <span style="color:var(--ink3);font-weight:700;font-size:1rem">(optional)</span></div>
    <p class="note" style="padding-top:6px">Add your current and goal weight to see a progress bar and a goal line on the chart. Skip if you're not sure yet.</p></div>
    <div class="bc-grid">
      <label class="field-label">Current weight (kg)<input id="obW" inputmode="decimal" placeholder="e.g. 89"></label>
      <label class="field-label">Goal weight (kg)<input id="obGoal" inputmode="decimal" placeholder="e.g. 70"></label>
    </div>
    <button class="save" onclick="obFinish(false)">${svg(I.check,'ic')} FINISH</button>
    <button class="set-btn" onclick="obFinish(true)">Skip for now</button>
    <button class="set-btn" style="border:none;background:none;color:var(--ink3)" onclick="obBack()">Back</button>`;
  view().innerHTML=`<div class="stack">${body}${obDots()}</div>`;
  const inp=$("#obName");if(inp)inp.focus();
}
window.obNext=()=>{
  if(obStep===1){const n=sanitizeName(($("#obName")||{}).value);if(!n){toast("Enter your name");return;}obName=n;}
  obStep++;renderOnboard();
};
window.obBack=()=>{if(obStep>0){obStep--;renderOnboard();}};
window.obFinish=skip=>{
  const p={name:obName};
  if(!skip){
    const w=parseFloat(($("#obW")||{}).value),g=parseFloat(($("#obGoal")||{}).value);
    if(w&&w>0){p.start_w=w;LS.set("weights",[{date:todayStr(),kg:w}]);}
    if(g&&g>0)p.goal_kg=g;
  }
  if(!LS.set("profile",p))return;
  toast("Welcome, "+p.name+"!");go("today");
};
/* First run = no profile key AND no logged records. Existing pre-profile installs belong to Afif —
   seed silently instead of forcing onboarding. routines/theme don't count: they're seeded for everyone. */
function needsOnboarding(){
  if(profile())return false;
  const has=workouts().length||weights().length||cardioSessions().length||LS.get("weekly_checkins",[]).length||bodyComps().length;
  if(has){LS.set("profile",{name:"Afif"});return false;}
  return true;
}

/* ---------- tabs + history nav ---------- */
const RENDERERS={today:renderToday,lift:renderLift,cardio:renderCardio,weight:renderWeight,history:renderHistory,checkin:renderCheckin,photos:renderPhotos,settings:renderSettings,profile:renderProfile,routines:renderRoutinesScreen,finishgate:renderFinishGate,onboard:renderOnboard};
const TABBAR=[["today","Home",I.home],["lift","Workout",I.dumbbell],["cardio","Cardio",I.activity],["history","History",I.check],["profile","Profile",I.user]];
const PROFILE_SUB=["weight","checkin","photos","settings"];
const WORKOUT_SUB=["routines","finishgate"];
const TITLES={today:"",lift:"Workout",cardio:"Cardio",weight:"Weight",history:"History",checkin:"Check-in",photos:"Photos",settings:"Settings",profile:"Profile",routines:"Routines",finishgate:"Add progress photo",onboard:""};
let navStack=[],navIndex=-1;
function activeTabRoot(){if(tab==="profile"||PROFILE_SUB.includes(tab))return "profile";if(tab==="lift"||WORKOUT_SUB.includes(tab))return "lift";if(tab==="cardio")return "cardio";if(tab==="history")return "history";return "today";}
/* Onboarding and an active workout both hide the tab bar (focus mode). */
const chromeHidden=()=>tab==="onboard"||(!!workoutStart&&(tab==="lift"||tab==="finishgate"));
function renderHeader(){
  if(tab==="onboard"){$("#appHead").innerHTML=`<span class="head-nav"></span><h1 class="head-title">${markSVG('wmk')}<span>Fit<span class="sl">Rack</span></span></h1><span class="head-right-sp"></span>`;return;}
  const back=navIndex>0&&!workoutStart,fwd=navIndex<navStack.length-1&&!workoutStart;
  const nav=`<div class="head-nav"><button class="nav-btn ${back?'':'disabled'}" aria-label="Back" ${back?'onclick="goBack()"':''}>${svg(I.back,'ic')}</button><button class="nav-btn ${fwd?'':'disabled'}" aria-label="Forward" ${fwd?'onclick="goForward()"':''}>${svg(I.fwd,'ic')}</button></div>`;
  const title=tab==="today"?`<h1 class="head-title">${markSVG('wmk')}<span>Fit<span class="sl">Rack</span></span></h1>`:`<span class="head-title sub">${TITLES[tab]||""}</span>`;
  let right=`<span class="head-right-sp"></span>`;
  if(tab==="today")right=`<span class="date mono">${todayStr()}</span>`;
  else if(tab==="lift")right=workoutStart?`<button class="edit-btn discard" onclick="discardWorkout()">${svg(I.x,'ic')}Discard</button>`:`<button class="edit-btn" onclick="go('routines')">${svg(I.pencil,'ic')}Routines</button>`;
  $("#appHead").innerHTML=`${nav}${title}${right}`;
}
function renderTabbar(){document.querySelector(".tabbar").classList.toggle("hide",chromeHidden());const root=activeTabRoot();$("#tabbar").innerHTML=TABBAR.map(([id,label,icon])=>`<button class="tabc ${root===id?'on':''}" aria-label="${label}" onclick="go('${id}')">${svg(icon)}<span>${label}</span></button>`).join("");}
window.go=id=>{
  if(workoutStart&&id!=="lift"&&id!=="finishgate"){toast("Finish or discard your workout first");return;}
  navStack=navStack.slice(0,navIndex+1);navStack.push(id);navIndex=navStack.length-1;tab=id;render();};
window.goBack=()=>{if(workoutStart)return;if(navIndex>0){navIndex--;tab=navStack[navIndex];render();}};
window.goForward=()=>{if(workoutStart)return;if(navIndex<navStack.length-1){navIndex++;tab=navStack[navIndex];render();}};
function render(){renderHeader();renderTabbar();(RENDERERS[tab]||renderToday)();}

/* ---------- init ---------- */
theme=LS.get("theme","lime");applyTheme();
migrateWorkouts();
migrateCardio();
seedRoutines();
if(!routines()[sess])sess=routineNames()[0]||sess;
(()=>{
  const d=LS.get("lift_draft");if(!d)return;
  if(d.startedAt&&Date.now()-d.startedAt>12*3600*1000){
    if(confirm("You have an unfinished workout from "+new Date(d.startedAt).toLocaleString()+". Resume it? (Cancel discards it)")){
      if(d.sess&&routines()[d.sess])sess=d.sess;if(d.log)log=d.log;
      workoutStart=Date.now();saveDraft(); /* restart the clock so durationMin stays sane */
    }else{LS.del("lift_draft");}
    return;
  }
  if(d.sess&&routines()[d.sess])sess=d.sess;if(d.log)log=d.log;if(d.startedAt)workoutStart=d.startedAt;
})();
if(navigator.storage&&navigator.storage.persist)navigator.storage.persist().catch(()=>{});
/* Order matters: a restored draft must land on "lift" — the focus-mode nav guard blocks go("today") while a workout is active. */
if(workoutStart)go("lift");
else if(needsOnboarding())go("onboard");
else go("today");

if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}));}
</script>
</body>
</html>
